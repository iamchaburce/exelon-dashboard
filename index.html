<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPSI Procurement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161922;--bg3:#1e2330;--bg4:#252d3d;
  --border:#2a3244;--border2:#344060;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#0ea5e9;
  --green:#34d399;--green2:#10b981;
  --amber:#fbbf24;--amber2:#f59e0b;
  --red:#f87171;--red2:#ef4444;
  --purple:#a78bfa;--purple2:#8b5cf6;
  --teal:#2dd4bf;--teal2:#14b8a6;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100vh;overflow:hidden;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Layout ──────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────── */
.sb{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sb-mark{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--accent);letter-spacing:.12em;margin-bottom:2px}
.sb-name{font-size:13px;font-weight:600;color:var(--text)}
.sb-tag{font-size:9px;color:var(--text3);margin-top:1px;font-family:var(--font-mono)}
.sb-sec{padding:14px 14px 4px;font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--font-mono)}
.sb-item{padding:6px 12px;font-size:11.5px;color:var(--text2);cursor:pointer;border-radius:6px;margin:1px 6px;transition:all .1s;display:flex;align-items:center;gap:8px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:rgba(56,189,248,.1);color:var(--accent);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;margin-left:4px}
.sb-add{margin:8px 8px 4px;padding:7px 12px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);border-radius:7px;color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--font-body);font-weight:500;transition:all .12s;text-align:left}
.sb-add:hover{background:rgba(56,189,248,.15)}

/* ── Main ─────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.tb-title{font-size:13px;font-weight:600;color:var(--text)}
.tb-sub{font-size:9.5px;color:var(--text3);font-family:var(--font-mono);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.loading{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.saving{background:var(--accent);animation:pulse .4s infinite}
.sync-dot.error{background:var(--red)}
.sync-txt{font-size:10px;color:var(--text3);font-family:var(--font-mono);white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .1s;font-family:var(--font-body)}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-accent{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:var(--accent)}
.btn-accent:hover{background:rgba(56,189,248,.18)}
.btn-green{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25);color:var(--green)}
.btn-green:hover{background:rgba(52,211,153,.18)}

/* ── Content ──────────────────────────────────── */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ── Client tab bar ───────────────────────────── */
.client-bar{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;scrollbar-width:none}
.client-bar::-webkit-scrollbar{display:none}
.ctab{padding:9px 14px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .12s;font-family:var(--font-body)}
.ctab:hover{color:var(--text2)}
.ctab.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent);background:rgba(56,189,248,.04)}
.ctab-count{font-family:var(--font-mono);font-size:9px;opacity:.5;margin-left:4px}

/* ── KPI bar ──────────────────────────────────── */
.kpi-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.kpi{flex:1;padding:8px 12px;background:var(--bg2);min-width:0}
.kpi-l{font-size:8.5px;font-family:var(--font-mono);font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.kpi-v{font-size:18px;font-weight:600;font-family:var(--font-mono);line-height:1}

/* ── Body scroll ──────────────────────────────── */
.body{flex:1;overflow-y:auto;padding:12px 16px}

/* ── Project section ──────────────────────────── */
.proj-search-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search{flex:1;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none;font-family:var(--font-body);transition:border-color .1s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text3)}
.proj-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:6px;transition:border-color .12s}
.proj-card.open{border-color:var(--border2)}
.proj-hdr{width:100%;display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--bg2);border:none;cursor:pointer;text-align:left;transition:background .1s}
.proj-card.open .proj-hdr{background:var(--bg3)}
.proj-hdr:hover{background:var(--bg3)}
.proj-arrow{font-size:8px;color:var(--text3);min-width:8px;transition:transform .12s}
.proj-card.open .proj-arrow{transform:rotate(90deg);color:var(--accent)}
.proj-name{font-size:12px;font-weight:500;color:var(--text2);flex:1}
.proj-card.open .proj-name{color:var(--text)}
.pill{font-size:9px;padding:2px 6px;border-radius:999px;font-weight:600;font-family:var(--font-mono);white-space:nowrap}
.proj-body{display:none;background:var(--bg)}
.proj-card.open .proj-body{display:block}

/* ── BOM Table ────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
/* Column group headers */
.cg-row th{padding:4px 8px;font-size:8.5px;font-family:var(--font-mono);font-weight:600;text-transform:uppercase;letter-spacing:.06em;text-align:center;border-bottom:none;border-right:1px solid var(--border)}
.cg-row th:last-child{border-right:none}
.cg-item{background:var(--bg3);color:var(--text3)}
.cg-canvass{background:rgba(251,191,36,.06);color:var(--amber)}
.cg-po{background:rgba(167,139,250,.06);color:var(--purple)}
.cg-delivery{background:rgba(45,212,191,.06);color:var(--teal)}
.cg-payment{background:rgba(52,211,153,.06);color:var(--green)}
/* Field headers */
th{padding:5px 8px;background:var(--bg2);color:var(--text3);font-size:9px;font-family:var(--font-mono);font-weight:500;letter-spacing:.04em;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2}
th.e{background:rgba(255,255,255,.025)}
td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.td-m{color:var(--text3)}
.td-mono{font-family:var(--font-mono);font-size:10px}
.td-r{text-align:right}
.td-clip{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-sm{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.no-rows{padding:24px;text-align:center;color:var(--text3)}
/* Column borders between groups */
.grp-start{border-left:1px solid rgba(255,255,255,.06)}

/* ── Badge ────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:9.5px;font-weight:600;white-space:nowrap;font-family:var(--font-mono)}

/* ── Editable cell ────────────────────────────── */
.ec{cursor:pointer;position:relative}
.ec:hover .ec-v{background:rgba(56,189,248,.06);border-radius:3px}
.ec-v{display:block;padding:2px 3px;border-radius:3px;min-height:17px;min-width:36px}
.ec input,.ec select{font-size:11px;padding:2px 5px;border:1.5px solid var(--accent);border-radius:4px;background:var(--bg3);color:var(--text);outline:none;width:100%;min-width:70px;font-family:var(--font-body)}
.ec select{cursor:pointer}

/* ── Toast ────────────────────────────────────── */
.toast{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:8px;font-size:11px;font-family:var(--font-mono);opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;border:1px solid}
.toast.show{opacity:1}
.toast.ok{background:#052e16;border-color:#16a34a;color:var(--green)}
.toast.err{background:#450a0a;border-color:#dc2626;color:var(--red)}
.toast.saving{background:#0c1a2e;border-color:#0ea5e9;color:var(--accent)}

/* ── Center ───────────────────────────────────── */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:var(--text3)}
.spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;min-height:400px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:min(520px,94vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:13px;font-weight:600;color:var(--text)}
.modal-sub{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.fl{font-size:9.5px;font-weight:600;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}
.fi{padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:var(--font-body);transition:border-color .1s}
.fi:focus{border-color:var(--accent)}
select.fi{cursor:pointer}
.ferr{display:none;margin-top:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--red);font-family:var(--font-mono)}
.fprev{display:none;margin-top:12px;background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.15);border-radius:8px;padding:10px 14px}
.fprev-title{font-size:9px;font-weight:600;color:var(--accent);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.fprev-row{font-size:11px;color:var(--text2);margin-bottom:3px;font-family:var(--font-mono)}
.fprev-row strong{color:var(--text)}

/* ── Tab bar (Alerts etc) ─────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tbb{padding:8px 14px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font-body);font-weight:500;transition:all .12s}
.tbb:hover{color:var(--text2)}
.tbb.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}
.badge-pill{font-family:var(--font-mono);font-size:9px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:8px;margin-left:4px}

/* ── Flat table pane ──────────────────────────── */
.flat-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}
.flat-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.flat-body{flex:1;overflow:auto}

/* ── Alerts ───────────────────────────────────── */
.alert-list{padding:14px}
.alert-row-link:hover td{background:rgba(56,189,248,.08)!important;cursor:pointer}
.alert-row-link td{transition:background .1s}
.ac{border:1px solid;border-radius:8px;padding:10px 14px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start}
.ac.warn{background:rgba(251,191,36,.05);border-color:rgba(251,191,36,.2)}
.ac.crit{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.2)}
.ac.info{background:rgba(56,189,248,.05);border-color:rgba(56,189,248,.15)}
.ac-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ac-title{font-size:12px;font-weight:600;margin-bottom:2px}
.ac-desc{font-size:11px;color:var(--text3)}
.ac-n{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:auto;flex-shrink:0}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<nav class="sb">
  <div class="sb-logo">
    <div class="sb-mark">EPSI</div>
    <div class="sb-name">Procurement</div>
    <div class="sb-tag">v7 · live sync</div>
  </div>
  <div class="sb-sec">Procurement</div>
  <div class="sb-item active" onclick="go('bom')">📦 BOM / Client View</div>
  <div class="sb-item" onclick="go('mrs')">📝 MRS</div>
  <div class="sb-item" onclick="go('po')">🛒 Purchase Orders</div>
  <div class="sb-item" onclick="go('wh')">🏭 WH Incoming</div>
  <div class="sb-item" onclick="go('vp')">💰 Vendor Bill</div>
  <div class="sb-item" onclick="go('history')">📊 Item History</div>
  <div class="sb-item" onclick="go('alerts')">🚨 Alerts</div>
  <div class="sb-sec">Equipment</div>
  <div class="sb-item" onclick="go('equip')">🔧 Machine List</div>
  <div class="sb-item" onclick="go('equiplog')">🛠️ Machine Log</div>
  <div class="sb-item" onclick="go('testequip')">🔬 Test Equipment</div>
  <div class="sb-sec">Actions</div>
  <button class="sb-add" onclick="openAddProject()">➕ Add New Project</button>
  <div class="sb-item" onclick="loadData()">↻ Refresh All</div>
</nav>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div style="min-width:0">
      <div class="tb-title" id="pgTitle">Client View — BOM</div>
      <div class="tb-sub" id="pgSub">connecting…</div>
    </div>
    <div class="tb-right">
      <div class="sync-dot loading" id="dot"></div>
      <span class="sync-txt" id="dotTxt">loading</span>
      <button class="btn" onclick="loadData()">↻</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="center"><div class="spinner"></div><div style="font-family:var(--font-mono);font-size:11px">fetching live data…</div></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEB_APP='https://script.google.com/macros/s/AKfycbz5tZPx3jLzVbzfW-nzy72hk4RnZ_-L5hRbV8yX1zhbp1Qe-tJOVDUUwYNOoZW2H8pU/exec';
let API=null, activeTab='bom', activeCli='', openProj={}, projQ={}, itemQ={}, tblQ={};
let ALL_CATS=[], ALL_MRS_CATS=[];  // populated after load

// Compute client-side balance for a BOM item
function computeBal(it){
  const dq=Number(it.delQty||0), cq=Number(it.cancelQty||0), q=Number(it.qty||0);
  if(dq===0&&cq===0) return it.balQty!==''&&it.balQty!=null ? it.balQty : '';
  return Math.max(0, q-dq-cq);
}
// Compute WH status client-side
function computeWH(it, bal){
  const dq=Number(it.delQty||0);
  if(dq<=0) return it.whStatus||'⬜ Pending';
  return (bal===0||Number(bal)<=0)?'✅ Complete':'🔄 Partial';
}
// Update DOM balance + WH status when del/cancel qty changes
function updateBalanceDOM(sheet, rowIndex, col, newVal){
  const tr=document.querySelector(`tr[data-sheet="${sheet}"][data-row="${rowIndex}"]`);
  if(!tr) return;
  const qty=Number(tr.dataset.qty||0);
  const delQty=col===29?Number(newVal||0):Number(tr.dataset.delqty||0);
  const cancelQty=col===30?Number(newVal||0):Number(tr.dataset.cancelqty||0);
  if(col===29) tr.dataset.delqty=newVal||0;
  if(col===30) tr.dataset.cancelqty=newVal||0;
  const bal=Math.max(0,qty-delQty-cancelQty);
  const balCell=tr.querySelector('.bal-cell');
  if(balCell) balCell.textContent=bal||'—';
  const whStatus=delQty<=0?'⬜ Pending':bal<=0?'✅ Complete':'🔄 Partial';
  const whCell=tr.querySelector('.wh-cell .ec-v');
  if(whCell) whCell.innerHTML=bdg(whStatus);
  // Auto-derive BOM status
  const poNum=tr.dataset.ponum||'';
  const whStock=tr.dataset.whstock==='true';
  let newStatus=tr.dataset.status||'';
  if(whStock) newStatus='🏭 Warehouse Stock';
  else if(whStatus==='✅ Complete') newStatus='✅ Delivered';
  else if(poNum.startsWith('P')) newStatus='✅ PO Issued';
  const statusCell=tr.querySelector('.status-cell .ec-v');
  if(statusCell) statusCell.innerHTML=bdg(newStatus);
}

// ── Options ──────────────────────────────────────
const BOM_ST=['🟡 For Canvass','🟢 Ready for PO','✅ PO Issued','🏭 Warehouse Stock','✅ Delivered'];
const WH_ST=['⬜ Pending','🔄 Partial','✅ Complete'];
const PAY_ST=['','⬜ Unpaid','🔄 Partial Pay','✅ Paid'];
const TERMS=['COD','30 days','45 days','60 days','Upon Delivery','Advanced'];
const MACH_ST=['Active','Under Maintenance','For Repair','Retired'];
const LOG_TYPE=['PM','Repair','Calibration','Inspection','Breakdown'];
const CALIB_ST=['Valid','Due Soon','Overdue','For Calibration'];

// ── Badge map ─────────────────────────────────────
const BM={
  '🟡 For Canvass':   ['rgba(251,191,36,.15)','#fbbf24'],
  '🟢 Ready for PO':  ['rgba(52,211,153,.12)','#34d399'],
  '✅ PO Issued':      ['rgba(167,139,250,.12)','#a78bfa'],
  '🏭 Warehouse Stock':['rgba(45,212,191,.12)','#2dd4bf'],
  '✅ Delivered':      ['rgba(52,211,153,.12)','#34d399'],
  '⬜ Pending':        ['rgba(100,116,139,.12)','#64748b'],
  '🔄 Partial':        ['rgba(251,191,36,.12)','#fbbf24'],
  '🔄 Partial Pay':    ['rgba(251,191,36,.12)','#fbbf24'],
  '✅ Complete':       ['rgba(52,211,153,.12)','#34d399'],
  '⬜ Unpaid':         ['rgba(248,113,113,.12)','#f87171'],
  '✅ Paid':           ['rgba(52,211,153,.12)','#34d399'],
  'Active':            ['rgba(52,211,153,.12)','#34d399'],
  'Under Maintenance': ['rgba(251,191,36,.12)','#fbbf24'],
  'For Repair':        ['rgba(248,113,113,.12)','#f87171'],
  'Retired':           ['rgba(100,116,139,.12)','#64748b'],
  'Valid':             ['rgba(52,211,153,.12)','#34d399'],
  'Due Soon':          ['rgba(251,191,36,.12)','#fbbf24'],
  'Overdue':           ['rgba(248,113,113,.12)','#f87171'],
};
function bdg(v){
  if(!v&&v!==0)return`<span class="badge" style="color:var(--text3)">—</span>`;
  const s=BM[v]||['rgba(255,255,255,.06)','#94a3b8'];
  return`<span class="badge" style="background:${s[0]};color:${s[1]}">${esc(v)}</span>`;
}
function pill(t,bg,c){return`<span class="pill" style="background:${bg};color:${c}">${t}</span>`;}
function fP(v){if(v===''||v==null)return'—';const n=parseFloat(v);if(isNaN(n))return'—';if(n===0)return'₱0';return'₱'+n.toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fD(v){if(!v)return'—';try{const d=new Date(v);if(isNaN(d))return v;return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}catch{return v;}}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s??'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escJ(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

// ── Toast ─────────────────────────────────────────
let toastTm;
function toast(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+t;clearTimeout(toastTm);toastTm=setTimeout(()=>el.classList.remove('show'),2800);}

// ── Sync state ─────────────────────────────────────
function setSync(st,msg){
  document.getElementById('dot').className='sync-dot'+(st==='loading'?' loading':st==='saving'?' saving':st==='error'?' error':'');
  document.getElementById('dotTxt').textContent=msg;
}

// ── Save cell ──────────────────────────────────────
async function saveCell(sheet,row,col,val){
  setSync('saving','saving…');
  // Immediately update balance in DOM for del qty / cancel qty changes
  if(col===29||col===30) updateBalanceDOM(sheet,row,col,val);
  try{
    const res=await fetch(WEB_APP+'?action=updateCell&payload='+encodeURIComponent(JSON.stringify({sheet,row,col,value:val})));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Failed');
    setSync('ok','saved ✓'); toast('✅ Saved','ok');
    setTimeout(()=>setSync('ok','live'),3000);
  }catch(e){setSync('error','error');toast('❌ '+e.message,'err');}
}

// ── Editable cell ──────────────────────────────────
function ec(val,sheet,row,col,type='text',opts=null){
  const id='e'+Math.random().toString(36).slice(2,8);
  const dv=val===''||val==null?'—':val;
  const rv=val===null||val===undefined?'':String(val);
  let inner;
  if(type==='select'&&opts){
    const o=opts.map(x=>`<option value="${escA(x)}"${x===rv?' selected':''}>${esc(x)}</option>`).join('');
    inner=`<span class="ec-v" id="d${id}">${rv?bdg(rv):'<span style="color:var(--text3)">—</span>'}</span>
    <select id="i${id}" style="display:none" onchange="cc('${id}','${escJ(sheet)}',${row},${col},'select')" onblur="xc('${id}')"><option value="">—</option>${o}</select>`;
  }else{
    inner=`<span class="ec-v" id="d${id}">${esc(dv)}</span>
    <input id="i${id}" type="${type==='number'?'number':'text'}" value="${escA(rv)}" style="display:none"
      onkeydown="if(event.key==='Enter')cc('${id}','${escJ(sheet)}',${row},${col},'${type}');if(event.key==='Escape')xc('${id}')"
      onblur="cc('${id}','${escJ(sheet)}',${row},${col},'${type}')">`;
  }
  return`<td class="ec" onclick="ac(event,'${id}')" title="✎ Click to edit">${inner}</td>`;
}
function ac(e,id){e.stopPropagation();const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i||i.style.display!=='none')return;d.style.display='none';i.style.display='block';i.focus();if(i.tagName==='INPUT')i.select();}
function cc(id,sh,row,col,type){const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i)return;const v=i.value;i.style.display='none';d.style.display='';if(type==='select')d.innerHTML=v?bdg(v):'<span style="color:var(--text3)">—</span>';else d.textContent=v||'—';saveCell(sh,row,col,v);}
function xc(id){const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i)return;i.style.display='none';d.style.display='';}

// ── Load data ──────────────────────────────────────
async function loadDataSilent(){
  try{
    const res=await fetch(WEB_APP+'?action=load');
    const j=await res.json();
    if(!j.ok) return;
    API=j;
    ALL_CATS=[...new Set((j.bom||[]).map(r=>r.category||'').filter(Boolean))].sort();
    ALL_MRS_CATS=[...new Set([...(j.bom||[]),...(j.mrs||[])].map(r=>r.category||'').filter(Boolean))].sort();
    const t=new Date(j.updated).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('pgSub').textContent=`live · ${j.bom?.length} BOM · ${j.mrs?.length} MRS · ${j.po?.length||0} PO · ${j.wh?.length||0} WH · updated ${t}`;
    setSync('ok','live');
  }catch(e){ setSync('error','error'); }
}

async function loadData(){
  setSync('loading','syncing…');
  document.getElementById('content').innerHTML='<div class="center"><div class="spinner"></div><div style="font-family:var(--font-mono);font-size:11px">fetching live data…</div></div>';
  try{
    const res=await fetch(WEB_APP+'?action=load');
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'API error');
    API=j;
    // Build category lists for dropdowns
    ALL_CATS=[...new Set((j.bom||[]).map(r=>r.category||'').filter(Boolean))].sort();
    ALL_MRS_CATS=[...new Set([...(j.bom||[]),...(j.mrs||[])].map(r=>r.category||'').filter(Boolean))].sort();
    const t=new Date(j.updated).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('pgSub').textContent=`live · ${j.bom?.length} BOM · ${j.mrs?.length} MRS · ${j.po?.length||0} PO · ${j.wh?.length||0} WH · updated ${t}`;
    setSync('ok','live');
    const sheets=[...new Set((j.bom||[]).map(r=>r.sheet))];
    if(!activeCli) activeCli=sheets[0]?.replace(/^📦\s*/,'').trim()||'';

  }catch(e){
    setSync('error','error');
    document.getElementById('content').innerHTML=`<div class="center"><div style="font-size:24px">⚠️</div><div style="font-family:var(--font-mono);color:var(--red)">${esc(e.message)}</div><button class="btn btn-accent" onclick="loadData()">↻ retry</button></div>`;
  }
}

// ── Tab routing ────────────────────────────────────
const TITLES={bom:'Client View — BOM',mrs:'Material Request Sheet',po:'Purchase Orders',wh:'WH Incoming',vp:'Vendor Bill',history:'Item History',alerts:'Alerts',equip:'Machine List',equiplog:'Machine Log',testequip:'Test Equipment'};
function go(tab){
  activeTab=tab;
  document.querySelectorAll('.sb-item').forEach(el=>{const oc=el.getAttribute('onclick')||'';el.classList.toggle('active',oc===`go('${tab}')`);}); 
  document.getElementById('pgTitle').textContent=TITLES[tab]||tab;
  if(API)renderTab(tab);
}

function renderTab(tab){
  if(!API)return;
  if(tab==='bom')renderBOM();
  else if(tab==='mrs')renderMRS();
  else if(tab==='po')renderPO();
  else if(tab==='wh')renderWH();
  else if(tab==='vp')renderVP();
  else if(tab==='history')renderHistory();
  else if(tab==='alerts')renderAlerts();
  else if(tab==='equip')renderFlat('equip',API.machineList||[],equipCfg());
  else if(tab==='equiplog')renderFlat('equiplog',API.machineLog||[],equipLogCfg());
  else if(tab==='testequip')renderFlat('testequip',API.testEquip||[],testEquipCfg());
}

// ── BOM / Client View ──────────────────────────────
function getClients(){
  // Use bomSheets from API (includes empty new projects), fallback to bom data
  if(API.bomSheets&&API.bomSheets.length>0){
    return API.bomSheets.map(s=>({sheet:s.sheet,name:s.clientName,meta:s}));
  }
  return [...new Set((API.bom||[]).map(r=>r.sheet))].map(s=>({sheet:s,name:s.replace(/^📦\s*/,'').trim(),meta:null}));
}
function getBOMForClient(name){return(API.bom||[]).filter(r=>r.sheet.replace(/^📦\s*/,'').trim()===name);}

function renderBOM(){
  const clients=getClients();
  if(!activeCli&&clients.length) activeCli=clients[0].name;
  const items=getBOMForClient(activeCli);
  const projs={};
  items.forEach(it=>{const p=(it.project||'No Project').toString().trim();if(!projs[p])projs[p]=[];projs[p].push(it);});
  const pKeys=Object.keys(projs);
  const pq=(projQ['bom']||'').toLowerCase();
  const fp=pq?pKeys.filter(p=>p.toLowerCase().includes(pq)):pKeys;
  const st=kpis(items);

  const clientTabs=clients.map(c=>{
    const cnt=getBOMForClient(c.name).length;
    return `<button class="ctab${c.name===activeCli?' active':''}" onclick="activeCli='${escJ(c.name)}';renderBOM()">${esc(c.name)}<span class="ctab-count">${cnt||'new'}</span></button>`;
  }).join('');

  const kpiHtml=[
    ['CANVASS',st.canvass,'var(--amber)'],
    ['READY',st.ready,'var(--green)'],
    ['PO ISSUED',st.issued,'var(--purple)'],
    ['WH DONE',st.done,'var(--teal)'],
    ['UNPAID',st.unpaid,'var(--red)'],
    ['TOTAL',st.total,'var(--accent)'],
  ].map(([l,v,c])=>`<div class="kpi"><div class="kpi-l" style="color:${c}">${l}</div><div class="kpi-v" style="color:${c}">${v}</div></div>`).join('');

  // New project card for empty sheets (from bomSheets metadata)
  const activeMeta=(API.bomSheets||[]).find(s=>s.clientName===activeCli)||null;
  const cards=fp.length===0
    ? (activeMeta&&activeMeta.itemCount===0
        ? `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;margin:10px 0">
            <div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-bottom:8px">📦 New Project — No BOM items yet</div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px"><strong>${esc(activeMeta.projectTitle||'')}</strong></div>
            ${activeMeta.location?`<div style="font-size:11px;color:var(--text3)">📍 ${esc(activeMeta.location)}</div>`:''}
            ${activeMeta.contract?`<div style="font-size:11px;color:var(--green);margin-top:4px">💰 Contract: ₱${Number(activeMeta.contract).toLocaleString('en-PH')}</div>`:''}
            ${activeMeta.clientPO?`<div style="font-size:11px;color:var(--text3)">📄 Client PO: ${esc(activeMeta.clientPO)}</div>`:''}
            ${activeMeta.target?`<div style="font-size:11px;color:var(--amber)">🎯 Target: ${esc(activeMeta.target)}</div>`:''}
            <button class="btn btn-green" style="margin-top:12px" onclick="openAddBOMItem()">+ Add First BOM Item</button>
          </div>`
        : `<div class="no-rows" style="font-family:var(--font-mono)">no projects match</div>`)
    : fp.map(p=>buildProjCard(p,projs[p],pKeys)).join('');

  document.getElementById('content').innerHTML=`
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div class="client-bar">${clientTabs}</div>
      <div class="kpi-bar">${kpiHtml}</div>
      <div class="body">
        <div class="proj-search-row">
          <input class="search" type="text" placeholder="search projects…" value="${escA(projQ['bom']||'')}" oninput="projQ['bom']=this.value;renderBOM()">
          <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${fp.length}/${pKeys.length}</span>
          ${projQ['bom']?`<button class="btn" onclick="projQ['bom']='';renderBOM()">clear</button>`:''}
          <button class="btn btn-green" onclick="openAddBOMItem()">+ item</button>
        </div>
        ${cards}
      </div>
    </div>`;
}

function kpis(items){return{total:items.length,canvass:items.filter(i=>i.status==='🟡 For Canvass').length,ready:items.filter(i=>i.status==='🟢 Ready for PO').length,issued:items.filter(i=>i.status==='✅ PO Issued').length,done:items.filter(i=>i.whStatus==='✅ Complete').length,unpaid:items.filter(i=>i.payStatus==='⬜ Unpaid').length};}

function buildProjCard(proj,items,allKeys){
  const isOpen=openProj[proj]!==undefined?openProj[proj]:proj===allKeys[0];
  const st=kpis(items);
  const iq=(itemQ[proj]||'').toLowerCase();
  const fi=iq?items.filter(i=>[i.partDesc,i.catNo,i.vendor,i.poNum,i.status].some(f=>(f||'').toString().toLowerCase().includes(iq))):items;
  const pills=[
    st.canvass&&pill(`🟡 ${st.canvass}`,'rgba(251,191,36,.1)','#fbbf24'),
    st.ready&&pill(`🟢 ${st.ready}`,'rgba(52,211,153,.1)','#34d399'),
    st.issued&&pill(`✅ ${st.issued}`,'rgba(167,139,250,.1)','#a78bfa'),
    st.done&&pill(`✓ ${st.done}`,'rgba(45,212,191,.1)','#2dd4bf'),
    st.unpaid&&pill(`⬜ ${st.unpaid}`,'rgba(248,113,113,.1)','#f87171'),
    pill(items.length,'rgba(255,255,255,.05)','var(--text3)'),
  ].filter(Boolean).join('');
  const cid='pc'+Math.random().toString(36).slice(2,10);

  const rows=fi.length===0
    ?`<tr><td colspan="20" class="no-rows" style="font-family:var(--font-mono)">no items match</td></tr>`
    :fi.map(it=>{
      const s=it.sheet,r=it.rowIndex||0;
      // Compute budgetVsPct client-side (API may not have it yet)
      const bvp = (it.budgetVsPct!=null&&it.budgetVsPct!==undefined) ? it.budgetVsPct
        : (it.budget&&it.unitPrice) ? Math.round((Number(it.unitPrice)-Number(it.budget))/Number(it.budget)*1000)/10 : null;
      const bvpColor = bvp!=null ? (bvp>0?'var(--red)':bvp<0?'var(--green)':'var(--text3)') : 'var(--text3)';
      const bvpTxt = bvp!=null ? (bvp>0?'+':'')+bvp+'%' : '—';

      const cBal = computeBal(it);
      const cWH  = computeWH(it, cBal);
      return`<tr data-sheet="${escA(it.sheet)}" data-row="${r}" data-qty="${it.qty||0}" data-delqty="${Number(it.delQty||0)}" data-cancelqty="${Number(it.cancelQty||0)}" data-ponum="${escA(it.poNum||'')}" data-status="${escA(it.status||'')}" data-whstock="false">
        <td class="td-m td-mono td-r">${it.num}</td>
        <td class="td-m td-mono" style="white-space:nowrap;font-size:9.5px">${fD(it.date)}</td>
        ${r?ec(it.category,s,r,5,'select',ALL_CATS||[]):`<td class="td-m">${esc(it.category||'—')}</td>`}
        <td class="td-clip" title="${escA(it.partDesc)}">${esc(it.partDesc||'—')}</td>
        <td class="td-mono td-m" style="min-width:110px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escA(it.catNo)}">${esc(it.catNo||'—')}</td>
        <td class="td-r td-mono">${it.qty||'—'}</td>
        <td class="td-m">${esc(it.unit||'—')}</td>
        <!-- Canvass -->
        ${r?ec(it.v1,s,r,19,'number'):`<td class="td-r td-mono grp-start">${it.v1||'—'}</td>`}
        ${r?ec(it.v2,s,r,20,'number'):`<td class="td-r td-mono">${it.v2||'—'}</td>`}
        ${r?ec(it.v3,s,r,21,'number'):`<td class="td-r td-mono">${it.v3||'—'}</td>`}
        <!-- PO -->
        ${(()=>{
          const pv=it.poNum||'';
          const haspo=pv.startsWith('P');
          const link=haspo?`<span onclick="event.stopPropagation();jumpToPO('${escJ(pv)}')" title="▶ View in PO tab" style="cursor:pointer;color:var(--accent);margin-left:4px;font-size:9px">↗</span>`:'';
          if(r) return ec(pv,s,r,15)+`<td style="padding:0;width:14px;border-bottom:1px solid rgba(255,255,255,.03)">${link}</td>`;
          return `<td class="td-mono grp-start">${esc(pv||'—')}${link}</td><td style="width:0;padding:0"></td>`;
        })()}
        ${r?ec(it.vendor,s,r,16):`<td class="td-sm">${esc(it.vendor||'—')}</td>`}
        ${r?ec(it.unitPrice,s,r,17,'number'):`<td class="td-r td-mono">${fP(it.unitPrice)}</td>`}
        <td class="td-r td-mono td-m">${fP(it.budget)}</td>
        <td class="td-r td-mono" style="color:${bvpColor};font-weight:${bvp!=null&&bvp!==0?'600':'400'}">${bvpTxt}</td>
        ${r?ec(it.payTerms,s,r,28,'select',TERMS):`<td class="td-m">${esc(it.payTerms||'—')}</td>`}
        <!-- Delivery -->
        ${r?ec(it.delQty,s,r,29,'number'):`<td class="td-r td-mono grp-start">${it.delQty||'—'}</td>`}
        ${r?ec(it.cancelQty,s,r,30,'number'):`<td class="td-r td-mono">${it.cancelQty||'—'}</td>`}
        <td class="td-r td-mono td-m bal-cell" style="color:${Number(cBal)>0?'var(--amber)':'var(--text3)'}">${cBal!==''?cBal:'—'}</td>
        ${r?ec(it.expectedDate,s,r,32):`<td class="td-mono td-m" style="font-size:10px">${fD(it.expectedDate)}</td>`}
        ${r?ec(it.actualDate,s,r,33):`<td class="td-mono td-m" style="font-size:10px">${fD(it.actualDate)}</td>`}
        <!-- Status -->
        <td class="grp-start status-cell">${r?`<span class="ec-v">${bdg(it.status)}</span>`:bdg(it.status)}</td>
        <td class="wh-cell">${r?`<span class="ec-v">${bdg(cWH)}</span>`:bdg(cWH)}</td>
        <!-- Payment -->
        ${r?ec(it.invoice,s,r,35):`<td class="td-mono grp-start">${esc(it.invoice||'—')}</td>`}
        ${r?ec(it.amtPaid,s,r,36,'number'):`<td class="td-r td-mono">${fP(it.amtPaid)}</td>`}
        ${r?ec(it.orNum,s,r,37):`<td class="td-mono td-m">${esc(it.orNum||'—')}</td>`}
        ${r?ec(it.datePaid,s,r,38):`<td class="td-mono td-m" style="font-size:10px">${fD(it.datePaid)}</td>`}
        ${r?ec(it.payStatus,s,r,27,'select',PAY_ST):`<td>${bdg(it.payStatus)}</td>`}
      </tr>`;
    }).join('');

  return`<div class="proj-card${isOpen?' open':''}" id="${cid}">
    <button class="proj-hdr" onclick="tp('${escJ(proj)}','${cid}')">
      <span class="proj-arrow">▶</span>
      <span class="proj-name">${esc(proj)}</span>
      <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">${pills}</div>
    </button>
    <div class="proj-body">
      <div style="padding:6px 10px;display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--border)">
        <input style="flex:1;padding:4px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;outline:none;font-family:var(--font-mono)" type="text" value="${escA(itemQ[proj]||'')}" placeholder="search ${items.length} items…" oninput="itemQ['${escJ(proj)}']=this.value;renderBOM()">
        <span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">${fi.length}/${items.length}</span>
      </div>
      <div class="tbl-wrap" style="max-height:400px">
      <table>
        <thead>
          <tr class="cg-row">
            <th colspan="7" class="cg-item">Item Info</th>
            <th colspan="3" class="cg-canvass">Canvass (V1·V2·V3)</th>
            <th colspan="6" class="cg-po">Purchase Order</th>
            <th colspan="5" class="cg-delivery">Delivery</th>
            <th colspan="2" class="cg-po">Status</th>
            <th colspan="5" class="cg-payment">Payment</th>
          </tr>
          <tr>
            <th>#</th><th>Date</th><th>Category</th><th>Description</th><th style="min-width:120px">Cat No</th><th>Qty</th><th>Unit</th>
            <th class="e grp-start">V1</th><th class="e">V2</th><th class="e">V3</th><!-- Budget col shown via prevPrice field -->
            <th class="e grp-start">PO #</th><th class="e">Vendor</th><th class="e">Unit Price</th><th>Budget</th><th>vs Budget%</th><th class="e">Pay Terms</th>
            <th class="e grp-start">Del Qty</th><th class="e">Cancel</th><th>Balance</th><th class="e">Expected</th><th class="e">Actual</th>
            <th class="e grp-start">Status</th><th class="e">WH</th>
            <th class="e grp-start">Invoice #</th><th class="e">Amt Paid</th><th class="e">OR #</th><th class="e">Date Paid</th><th class="e">Pay Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>
  </div>`;
}

function tp(proj,cid){const c=document.getElementById(cid);if(!c)return;const n=!c.classList.contains('open');c.classList.toggle('open',n);openProj[proj]=n;}

// Jump to PO tab and highlight a specific PO
function jumpToPO(poNum){
  activeTab='po';
  go('po');
  setTimeout(()=>{
    tblQ['po']=poNum;
    renderPO();
    // Open the matching PO card
    setTimeout(()=>{
      const cid='po_'+poNum.replace(/\W/g,'');
      const card=document.getElementById(cid);
      if(card){
        openProj['po_'+poNum]=true;
        card.classList.add('open');
        card.style.outline='2px solid var(--accent)';
        card.scrollIntoView({block:'center',behavior:'smooth'});
        setTimeout(()=>{ card.style.outline=''; tblQ['po']=''; },3000);
      }
    },200);
  },100);
}

// Jump to BOM tab for a specific item
function jumpToBOM(sheet, rowIndex, projName){
  const clientName = sheet.replace(/^📦\s*/,'').trim();
  activeCli = clientName;
  activeTab = 'bom';
  go('bom');
  // Open the right project card and highlight
  setTimeout(()=>{
    // open all projects that contain this item
    Object.keys(openProj).forEach(k=>{ openProj[k]=false; });
    if(projName) openProj[projName]=true;
    renderBOM();
    setTimeout(()=>{
      const tr=document.querySelector(`tr[data-sheet="${sheet}"][data-row="${rowIndex}"]`);
      if(tr){ tr.style.outline='2px solid var(--accent)'; tr.scrollIntoView({block:'center',behavior:'smooth'}); setTimeout(()=>tr.style.outline='',3000); }
    },200);
  },100);
}

// ── Flat table ─────────────────────────────────────
function renderFlat(key,data,cfg){
  const q=(tblQ[key]||'').toLowerCase();
  const fd=q?data.filter(r=>cfg.search.some(f=>(r[f]||'').toString().toLowerCase().includes(q))):data;
  const heads=cfg.cols.map(c=>`<th${c.e?' class="e"':''}${c.gs?' style="border-left:1px solid rgba(255,255,255,.06)"':''}>${esc(c.lbl)}${c.e?' ✎':''}</th>`).join('');
  const rows=fd.length===0
    ?`<tr><td colspan="${cfg.cols.length}" class="no-rows" style="font-family:var(--font-mono)">no results${q?` — "${esc(q)}"`:''}</td></tr>`
    :fd.map(row=>'<tr>'+cfg.cols.map(c=>{
      const v=row[c.f];
      if(c.e&&row.rowIndex)return ec(v,cfg.sheet,row.rowIndex,c.col,c.type||'text',c.opts||null);
      if(c.bdg)return`<td>${bdg(v)}</td>`;
      if(c.peso)return`<td class="td-r td-mono">${fP(v)}</td>`;
      if(c.date)return`<td class="td-mono td-m" style="font-size:10px;white-space:nowrap">${fD(v)}</td>`;
      if(c.mono)return`<td class="td-mono td-m">${esc(v||'—')}</td>`;
      if(c.clip)return`<td class="td-clip" title="${escA(v)}">${esc(v||'—')}</td>`;
      return`<td>${esc(v||'—')}</td>`;
    }).join('')+'</tr>').join('');

  document.getElementById('content').innerHTML=`
    <div class="flat-pane">
      <div class="flat-toolbar">
        <input class="search" style="max-width:260px" type="text" placeholder="search ${data.length} rows…" value="${escA(tblQ[key]||'')}" oninput="tblQ['${key}']=this.value;renderTab('${key}')">
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${fd.length}/${data.length}</span>
        ${tblQ[key]?`<button class="btn" onclick="tblQ['${key}']='';renderTab('${key}')">clear</button>`:''}
        ${cfg.addBtn?`<button class="btn btn-green" onclick="openAddModal('${key}')">+ add row</button>`:''}
        <span style="font-size:9.5px;color:var(--text3);font-family:var(--font-mono);margin-left:auto">✎ yellow cols = editable → auto-saves to Google Sheets</span>
      </div>
      <div class="flat-body"><table><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
}

// ── Alerts — clickable to see items ──────────────────────────
let _alertDetail = null;
function renderAlerts(){
  const bom=API.bom||[], vp=API.vp||[];
  const canvass=bom.filter(i=>i.status==='🟡 For Canvass');
  const ready=bom.filter(i=>i.status==='🟢 Ready for PO');
  const unpaid=vp.filter(i=>i.payStatus==='⬜ Unpaid'||i.payStatus==='🔄 Partial Pay');
  const noDelivery=bom.filter(i=>i.status==='✅ PO Issued'&&(!i.whStatus||i.whStatus==='⬜ Pending')&&!Number(i.delQty||0));
  const partialDel=bom.filter(i=>i.whStatus==='🔄 Partial'||i.whStatus==='🔄 Partial Delivery');
  const groups=[
    {type:'warn',icon:'🟡',title:'For Canvass',sub:'Need vendor quotation',items:canvass,color:'var(--amber)',key:'canvass'},
    {type:'info',icon:'🟢',title:'Ready for PO',sub:'Has price — no PO# yet',items:ready,color:'var(--green)',key:'ready'},
    {type:'crit',icon:'🔴',title:'Unpaid / Partial Bills',sub:'Vendor Bill outstanding',items:unpaid,color:'var(--red)',key:'unpaid'},
    {type:'warn',icon:'🚚',title:'Pending Delivery',sub:'PO issued, not yet received',items:noDelivery,color:'var(--amber)',key:'pending'},
    {type:'info',icon:'📦',title:'Partial Delivery',sub:'Balance still pending',items:partialDel,color:'var(--teal)',key:'partial'},
  ].filter(g=>g.items.length>0);

  function makeDetail(g) {
    const isBOM = g.key!=='unpaid';
    const rows = g.items.map(it => {
      if(isBOM){
        const clickable = it.sheet && it.rowIndex;
        const proj = it.project||'';
        const onclk = clickable ? `onclick="jumpToBOM('${escJ(it.sheet)}',${it.rowIndex},'${escJ(proj)}')" style="cursor:pointer" title="▶ Click to open in BOM tab"` : '';
        return `<tr ${onclk} class="${clickable?'alert-row-link':''}">
          <td class="td-mono td-m" style="font-size:10px">${esc((it.sheet||'').replace(/^📦\s*/,''))}</td>
          <td class="td-clip" style="max-width:120px" title="${escA(proj)}">${esc(proj||'—')}</td>
          <td class="td-clip" title="${escA(it.partDesc)}">${esc(it.partDesc||'—')}</td>
          <td class="td-mono td-m" style="min-width:90px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(it.catNo||'—')}</td>
          <td class="td-r td-mono">${it.qty||'—'} ${esc(it.unit||'')}</td>
          <td class="td-r td-mono td-m">${fP(it.budget)}</td>
          <td>${bdg(it.status)}</td>
          <td class="td-mono td-m">${esc(it.poNum||'—')}</td>
          <td class="td-clip td-m">${esc(it.vendor||'—')}</td>
          <td class="td-r td-mono">${fP(it.unitPrice)}</td>
          ${clickable?`<td style="font-size:9px;color:var(--accent);font-family:var(--font-mono)">▶ open</td>`:'<td></td>'}
        </tr>`;
      } else {
        return `<tr>
          <td class="td-mono td-m">${esc(it.poNum||'—')}</td>
          <td class="td-clip">${esc(it.supplier||'—')}</td>
          <td class="td-clip">${esc(it.partDesc||'—')}</td>
          <td class="td-r td-mono">${fP(it.amount)}</td>
          <td class="td-r td-mono">${fP(it.amtPaid)}</td>
          <td class="td-r td-mono" style="color:var(--red)">${fP(it.balance)}</td>
          <td>${bdg(it.payStatus)}</td>
          <td class="td-mono td-m">${esc(it.invoice||'—')}</td>
        </tr>`;
      }
    }).join('');
    const hdrs = isBOM
      ? '<th>Client</th><th>Project</th><th>Description</th><th>Cat No</th><th>Qty</th><th>Budget</th><th>Status</th><th>PO #</th><th>Vendor</th><th>Unit Price</th><th></th>'
      : '<th>PO #</th><th>Supplier</th><th>Description</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Status</th><th>Invoice</th>';
    return `<div style="margin-top:10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;overflow:hidden">
      <div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:${g.color}">${g.icon} ${g.title} — ${g.items.length} items</span>
        ${isBOM?`<span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">click any row to open in BOM tab ▶</span>`:''}
      </div>
      <div style="max-height:320px;overflow:auto">
        <table><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }

  const cards = groups.map(g => {
    const isActive = _alertDetail===g.key;
    return `<div class="ac ${g.type}" style="cursor:pointer;flex-direction:column" onclick="_alertDetail=_alertDetail==='${g.key}'?null:'${g.key}';renderAlerts()">
      <div style="display:flex;align-items:center;gap:10px;width:100%">
        <span class="ac-icon">${g.icon}</span>
        <div style="flex:1">
          <div class="ac-title" style="color:var(--text)">${esc(g.title)}</div>
          <div class="ac-desc">${esc(g.sub)}</div>
        </div>
        <span class="ac-n" style="background:rgba(255,255,255,.06);color:${g.color};font-size:16px;font-family:var(--font-mono)">${g.items.length}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">${isActive?'▲ hide':'▼ show'}</span>
      </div>
      ${isActive?makeDetail(g):''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="alert-list">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text2)">${groups.length} alert group${groups.length!==1?'s':''} · click to expand</div>
        <button class="btn" onclick="loadData()">↻ refresh</button>
      </div>
      ${groups.length===0?'<div class="no-rows" style="padding:40px;font-family:var(--font-mono)">✅ all clear — no alerts</div>':cards}
    </div>`;
}

// ── PO Tab — grouped by Project → PO# ────────────────────────
function renderPO() {
  const data = API.po || [];
  const q = (tblQ['po'] || '').toLowerCase();
  const groups = {}, groupOrder = [];
  data.forEach(row => {
    const po = row.poNum || '—';
    if (!groups[po]) { groups[po] = []; groupOrder.push(po); }
    groups[po].push(row);
  });
  const filteredKeys = q
    ? groupOrder.filter(po => groups[po].some(r => [r.project,r.partDesc,r.supplier,r.status,r.catNo,po].some(f=>(f||'').toLowerCase().includes(q))))
    : groupOrder;
  // Group by project
  const byProject = {}, projOrder = [];
  filteredKeys.forEach(po => {
    const proj = groups[po][0]?.project || '—';
    if (!byProject[proj]) { byProject[proj]=[]; projOrder.push(proj); }
    byProject[proj].push(po);
  });
  const grandTotal = filteredKeys.reduce((s,po)=>s+groups[po].reduce((s2,r)=>s2+Number(r.lineTotal||0),0),0);
  let html = '';
  projOrder.forEach(proj => {
    const projPOs = byProject[proj];
    const projTotal = projPOs.reduce((s,po)=>s+groups[po].reduce((s2,r)=>s2+Number(r.lineTotal||0),0),0);
    html += `<div style="background:rgba(56,189,248,.05);border-left:3px solid rgba(56,189,248,.3);padding:5px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px;border-radius:0 4px 4px 0">
      <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--accent)">${esc(proj)}</span>
      <span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">${projPOs.length} PO${projPOs.length!==1?'s':''}</span>
      <span style="font-size:9.5px;color:var(--teal);font-family:var(--font-mono);margin-left:auto">${fP(projTotal)}</span>
    </div>`;
    projPOs.forEach(po => {
      const items = groups[po];
      const s0 = items[0];
      const total = items.reduce((s,r)=>s+Number(r.lineTotal||0),0);
      const cid = 'po_'+po.replace(/\W/g,'');
      const isOpen = openProj['po_'+po];
      const rows = items.map(it => `<tr>
        <td class="td-clip" title="${escA(it.partDesc)}" style="min-width:180px">${esc(it.partDesc||'—')}</td>
        <td class="td-mono td-m" style="min-width:110px">${esc(it.catNo||'—')}</td>
        <td class="td-r td-mono">${it.qty||'—'}</td><td class="td-m">${esc(it.unit||'—')}</td>
        ${it.rowIndex?ec(it.unitPrice,'PO',it.rowIndex,9,'number'):`<td class="td-r td-mono">${fP(it.unitPrice)}</td>`}
        <td class="td-r td-mono td-m">${fP(it.lineTotal)}</td>
        <td class="td-mono td-m" style="font-size:10px;white-space:nowrap">${fD(it.poDate)}</td>
        ${it.rowIndex?ec(it.status,'PO',it.rowIndex,12,'select',['For Approval','✅ Approved','✅ Delivered','❌ Cancelled']):`<td>${bdg(it.status)}</td>`}
        ${it.rowIndex?ec(it.payTerms,'PO',it.rowIndex,13,'select',TERMS):`<td class="td-m">${esc(it.payTerms||'—')}</td>`}
        ${it.rowIndex?ec(it.remarks,'PO',it.rowIndex,16):`<td class="td-m td-sm">${esc(it.remarks||'—')}</td>`}
      </tr>`).join('');
      html += `<div class="proj-card${isOpen?' open':''}" id="${cid}" style="margin-bottom:3px;margin-left:10px">
        <button class="proj-hdr" onclick="tp('po_${escJ(po)}','${cid}')">
          <span class="proj-arrow">▶</span>
          <span class="proj-name" style="font-family:var(--font-mono);color:var(--accent);min-width:70px">${esc(po)}</span>
          <span class="pill" style="background:rgba(255,255,255,.05);color:var(--text3);font-family:var(--font-mono);margin-left:4px">${items.length} item${items.length!==1?'s':''}</span>
          <span style="flex:1"></span>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--teal)">${fP(total)}</span>
          <span style="margin-left:8px">${bdg(s0.status||'')}</span>
          <span style="margin-left:8px;font-size:11px;color:var(--text2);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400">${esc(s0.supplier||'')}</span>
        </button>
        <div class="proj-body"><div class="tbl-wrap" style="max-height:300px">
          <table><thead><tr>
            <th style="min-width:180px">Description</th><th style="min-width:110px">Cat No</th>
            <th>Qty</th><th>Unit</th>
            <th class="e">Unit Price ✎</th><th>Line Total</th><th>PO Date</th>
            <th class="e">Status ✎</th><th class="e">Pay Terms ✎</th><th class="e">Remarks ✎</th>
          </tr></thead><tbody>${rows}</tbody></table>
        </div></div>
      </div>`;
    });
    html += '<div style="height:6px"></div>';
  });
  if(!html) html='<div class="no-rows" style="font-family:var(--font-mono);padding:30px">no results</div>';
  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div class="flat-toolbar">
        <input class="search" style="max-width:260px" type="text" placeholder="search POs, supplier, item…" value="${escA(tblQ['po']||'')}" oninput="tblQ['po']=this.value;renderPO()">
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${filteredKeys.length}/${groupOrder.length} POs · ${data.length} lines · ${fP(grandTotal)}</span>
        ${tblQ['po']?`<button class="btn" onclick="tblQ['po']='';renderPO()">clear</button>`:''}
        <span style="font-size:9.5px;color:var(--text3);font-family:var(--font-mono);margin-left:auto">grouped by project → ✎ click to edit</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 14px">${html}</div>
    </div>`;
}

// ── Vendor Bill — grouped by Invoice# ────────────────────────
function renderVP() {
  const data = API.vp || [];
  const q = (tblQ['vp'] || '').toLowerCase();

  // Group by invoice# (empty invoice → group under PO#)
  const groups = {};
  const groupOrder = [];
  data.forEach(row => {
    const key = row.invoice ? `INV-${row.invoice}` : `PO-${row.poNum}`;
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(row);
  });

  const filteredKeys = q
    ? groupOrder.filter(k => {
        return k.toLowerCase().includes(q) ||
          groups[k].some(r => [r.supplier, r.project, r.poNum, r.payStatus, r.invoice].some(f => (f||'').toLowerCase().includes(q)));
      })
    : groupOrder;

  const cards = filteredKeys.length === 0
    ? `<div class="no-rows" style="font-family:var(--font-mono);padding:30px">no results</div>`
    : filteredKeys.map(key => {
        const items = groups[key];
        const s0 = items[0];
        const totalAmt = items.reduce((s, r) => s + Number(r.amount || 0), 0);
        const totalPaid = items.reduce((s, r) => s + Number(r.amtPaid || 0), 0);
        const balance = totalAmt - totalPaid;
        const cid = 'vp_' + key.replace(/\W/g, '');
        const isOpen = openProj['vp_' + key];
        const isInv = key.startsWith('INV-');
        const label = isInv ? s0.invoice : s0.poNum;

        const rows = items.map(it => `<tr>
          <td class="td-mono td-m" style="font-family:var(--font-mono)">${esc(it.poNum||'—')}</td>
          <td class="td-clip" title="${escA(it.partDesc)}">${esc(it.partDesc||'—')}</td>
          <td class="td-r td-mono">${it.delQty||'—'}</td>
          <td class="td-r td-mono">${fP(it.unitPrice)}</td>
          <td class="td-r td-mono">${fP(it.amount)}</td>
          ${ec(it.payTerms,'VP',it.rowIndex,14,'select',TERMS)}
          ${ec(it.dueDate,'VP',it.rowIndex,15,'text')}
          ${ec(it.payStatus,'VP',it.rowIndex,16,'select',PAY_ST)}
          ${ec(it.amtPaid,'VP',it.rowIndex,17,'number')}
          <td class="td-r td-mono">${fP(it.balance)}</td>
          ${ec(it.orNum,'VP',it.rowIndex,19,'text')}
          ${ec(it.datePaid,'VP',it.rowIndex,20,'text')}
        </tr>`).join('');

        const payStatus = totalPaid >= totalAmt && totalAmt > 0 ? '✅ Paid' : totalPaid > 0 ? '🔄 Partial Pay' : '⬜ Unpaid';

        return `<div class="proj-card${isOpen?' open':''}" id="${cid}">
          <button class="proj-hdr" onclick="tp('vp_${escJ(key)}','${cid}')">
            <span class="proj-arrow">▶</span>
            <span class="proj-name" style="font-family:var(--font-mono);color:${isInv?'var(--green)':'var(--accent)'}">${isInv?'🧾 INV-'+esc(label):'🛒 '+esc(label)}</span>
            <span style="font-size:11px;color:var(--text2);margin-left:6px">${esc(s0.supplier||'')}</span>
            <span style="flex:1"></span>
            <span class="pill" style="background:rgba(255,255,255,.06);color:var(--text3);font-family:var(--font-mono)">${items.length} line${items.length!==1?'s':''}</span>
            <span style="margin-left:6px;font-family:var(--font-mono);font-size:11px;color:var(--teal)">${fP(totalAmt)}</span>
            ${totalPaid > 0 ? `<span style="margin-left:4px;font-family:var(--font-mono);font-size:10px;color:var(--text3)">paid ${fP(totalPaid)}</span>` : ''}
            <span style="margin-left:6px">${bdg(payStatus)}</span>
          </button>
          <div class="proj-body">
            <div class="tbl-wrap" style="max-height:320px">
            <table>
              <thead><tr>
                <th>PO #</th><th>Description</th><th>Del Qty</th><th>Unit Price</th><th>Amount</th>
                <th class="e">Pay Terms ✎</th><th class="e">Due Date ✎</th>
                <th class="e">Pay Status ✎</th><th class="e">Amt Paid ✎</th>
                <th>Balance</th><th class="e">OR # ✎</th><th class="e">Date Paid ✎</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table></div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div class="flat-toolbar">
        <input class="search" style="max-width:260px" type="text" placeholder="search bills…" value="${escA(tblQ['vp']||'')}" oninput="tblQ['vp']=this.value;renderVP()">
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${filteredKeys.length} bills · ${data.length} lines</span>
        ${tblQ['vp'] ? `<button class="btn" onclick="tblQ['vp']='';renderVP()">clear</button>` : ''}
        <span style="font-size:9.5px;color:var(--text3);font-family:var(--font-mono);margin-left:auto">grouped by invoice — ✎ click to edit</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 14px">${cards}</div>
    </div>`;
}

// ── WH Tab — grouped by PO# ────────────────────────────────────
function renderWH() {
  const data = API.wh || [];
  const q = (tblQ['wh']||'').toLowerCase();
  // Group by PO#
  const groups = {}, gOrder = [];
  data.forEach(row => {
    const po = row.poNum||'—';
    if(!groups[po]){ groups[po]=[]; gOrder.push(po); }
    groups[po].push(row);
  });
  const filteredKeys = q
    ? gOrder.filter(po => groups[po].some(r=>[r.project,r.partDesc,r.supplier,r.status,po].some(f=>(f||'').toLowerCase().includes(q))))
    : gOrder;

  // Group by project for section headers
  const byProj={}, projOrder=[];
  filteredKeys.forEach(po=>{
    const proj=groups[po][0]?.project||'—';
    if(!byProj[proj]){byProj[proj]=[];projOrder.push(proj);}
    byProj[proj].push(po);
  });

  let html = '';
  projOrder.forEach(proj => {
    const projPOs = byProj[proj];
    html += `<div style="background:rgba(45,212,191,.04);border-left:3px solid rgba(45,212,191,.25);padding:5px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px;border-radius:0 4px 4px 0">
      <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--teal)">${esc(proj)}</span>
      <span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">${projPOs.length} PO${projPOs.length!==1?'s':''}</span>
    </div>`;
    projPOs.forEach(po => {
      const items = groups[po];
      const s0 = items[0];
      const cid = 'wh_'+po.replace(/\W/g,'');
      const isOpen = openProj['wh_'+po];
      const allComplete = items.every(r=>r.status==='✅ Complete');
      const anyDelivered = items.some(r=>Number(r.delQty||0)>0);
      const whStatus = allComplete?'✅ Complete':anyDelivered?'🔄 Partial':'⬜ Pending';
      const rows = items.map(it=>`<tr>
        <td class="td-clip" title="${escA(it.partDesc)}" style="min-width:160px">${esc(it.partDesc||'—')}</td>
        <td class="td-mono td-m">${esc(it.catNo||'—')}</td>
        <td class="td-r td-mono">${it.poQty||'—'}</td>
        <td class="td-r td-mono td-m">${it.delQty||'—'}</td>
        <td class="td-r td-mono td-m">${it.cancelQty||'—'}</td>
        <td class="td-r td-mono" style="color:${Number(it.balQty||0)>0?'var(--amber)':'var(--text3)'}">${it.balQty||'—'}</td>
        <td class="td-mono td-m" style="font-size:10px;white-space:nowrap">${fD(it.expectedDate)}</td>

}

// ── Item History — searchable with sort ────────────────────────
function renderHistory() {
  const all = API.itemHistory || [];
  const q   = (tblQ['history'] || '').toLowerCase();
  const cat = tblQ['histCat'] || '';
  const proj= tblQ['histProj'] || '';
  const sortDir = tblQ['histSort'] || 'desc'; // asc or desc

  const cats  = [...new Set(all.map(r => r.category || '').filter(Boolean))].sort();
  const projs = [...new Set(all.map(r => r.project  || '').filter(Boolean))].sort();

  let fd = all;
  if (q)    fd = fd.filter(r => [r.catNo, r.partDesc, r.vendor, r.poNum, r.source].some(f => (f||'').toLowerCase().includes(q)));
  if (cat)  fd = fd.filter(r => (r.category||'') === cat);
  if (proj) fd = fd.filter(r => (r.project||'') === proj);

  // Sort by poDate
  fd = [...fd].sort((a, b) => {
    const da = a.poDate ? new Date(a.poDate) : new Date(0);
    const db = b.poDate ? new Date(b.poDate) : new Date(0);
    return sortDir === 'asc' ? da - db : db - da;
  });

  // If searching for specific item, group by catNo to show full price trend
  let grouped = false;
  let groupedHtml = '';
  if (q && fd.length > 0) {
    const byItem = {};
    fd.forEach(r => {
      const k = r.catNo || r.partDesc || '';
      if (!byItem[k]) byItem[k] = [];
      byItem[k].push(r);
    });
    if (Object.keys(byItem).length <= 5) {
      grouped = true;
      groupedHtml = Object.entries(byItem).map(([item, rows]) => {
        const itemRows = rows.map(r => histRow(r)).join('');
        const prices = rows.filter(r => r.unitPrice).map(r => Number(r.unitPrice));
        const minP = prices.length ? Math.min(...prices) : null;
        const maxP = prices.length ? Math.max(...prices) : null;
        return `
          <tr><td colspan="12" style="background:rgba(56,189,248,.06);border-left:3px solid var(--accent);padding:5px 10px;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--accent)">
            ${esc(item)} <span style="color:var(--text3);font-weight:400">(${rows.length} transactions${minP?', range: '+fP(minP)+' – '+fP(maxP):''})</span>
          </td></tr>
          ${itemRows}`;
      }).join('');
    }
  }

  const tableRows = grouped ? groupedHtml : (fd.slice(0, 500).map(r => histRow(r)).join('') || `<tr><td colspan="12" class="no-rows" style="font-family:var(--font-mono)">no results</td></tr>`);

  document.getElementById('content').innerHTML = `
    <div class="flat-pane">
      <div class="flat-toolbar" style="flex-wrap:wrap;gap:6px">
        <input class="search" style="max-width:240px" type="text" placeholder="search items, cat no, vendor…" value="${escA(q)}" oninput="tblQ['history']=this.value;renderHistory()">
        <select class="search" style="max-width:180px;flex:none" onchange="tblQ['histCat']=this.value;renderHistory()">
          <option value="">All categories</option>
          ${cats.map(c => `<option value="${escA(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('')}
        </select>
        <select class="search" style="max-width:200px;flex:none" onchange="tblQ['histProj']=this.value;renderHistory()">
          <option value="">All projects</option>
          ${projs.map(p => `<option value="${escA(p)}"${p===proj?' selected':''}>${esc(p)}</option>`).join('')}
        </select>
        <button class="btn" onclick="tblQ['histSort']=tblQ['histSort']==='asc'?'desc':'asc';renderHistory()" title="Toggle date sort">
          📅 ${sortDir==='asc'?'Oldest first ↑':'Newest first ↓'}
        </button>
        ${(q||cat||proj)?`<button class="btn" onclick="tblQ['history']='';tblQ['histCat']='';tblQ['histProj']='';renderHistory()">clear all</button>`:''}
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${fd.length}/${all.length}${fd.length>500?' (showing 500)':''}</span>
      </div>
      <div class="flat-body">
        <table>
          <thead><tr>
            <th style="min-width:130px">Cat No</th>
            <th style="min-width:200px">Description</th>
            <th style="max-width:90px">Category</th>
            <th>PO #</th><th>Date</th><th style="max-width:130px">Supplier</th>
            <th>Unit Price</th><th>Budget</th>
            <th>Change ₱</th><th>% Change</th>
            <th style="max-width:100px">Trend</th>
            <th style="max-width:110px">Project</th><th>Source</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
}

function histRow(r) {
  // pctChange from API is a raw fraction (e.g. -0.546 = -54.6%)
  const pctRaw = r.pctChange!=null&&r.pctChange!=='' ? Number(r.pctChange) : null;
  const pct = pctRaw!=null ? pctRaw*100 : null;  // convert to %
  const pctColor = pct!=null ? (pct > 0 ? 'var(--red)' : pct < 0 ? 'var(--green)' : 'var(--text3)') : 'var(--text3)';
  const pctStr = pct!=null ? (pct>0?'+':'')+pct.toFixed(1)+'%' : '—';
  // Truncate cat no — max 20 chars visible
  const catNoFull = r.catNo||'—';
  const catNoShort = catNoFull.length > 20 ? catNoFull.substring(0,18)+'…' : catNoFull;
  return `<tr>
    <td class="td-mono" style="white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis" title="${escA(catNoFull)}">${esc(catNoShort)}</td>
    <td class="td-clip" style="min-width:180px;max-width:240px" title="${escA(r.partDesc)}">${esc(r.partDesc||'—')}</td>
    <td class="td-m" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.category||'—')}</td>
    <td class="td-mono td-m" style="white-space:nowrap">${esc(r.poNum||'—')}</td>
    <td class="td-mono td-m" style="white-space:nowrap;font-size:10px">${fD(r.poDate)}</td>
    <td class="td-clip td-m" style="max-width:140px">${esc(r.vendor||'—')}</td>
    <td class="td-r td-mono" style="white-space:nowrap">${fP(r.unitPrice)}</td>
    <td class="td-r td-mono td-m" style="white-space:nowrap">${fP(r.prevPrice||r.budget)}</td>
    <td class="td-r td-mono" style="color:${pctColor};white-space:nowrap">${r.priceChange?fP(r.priceChange):'—'}</td>
    <td class="td-r td-mono" style="color:${pctColor};font-weight:600;white-space:nowrap">${pctStr}</td>
    <td style="max-width:100px">
      ${(()=>{
        const sp=pct;  // use outer pct (already in %)
        if(sp===null||sp===undefined) return '<span style="color:var(--text3);font-size:10px">—</span>';
        const arrow=sp>0?'↑':'↓';
        const color=sp>0?'var(--red)':'var(--green)';
        const bars=Math.min(Math.abs(Math.round(sp/20)),5);
        const filled='█'.repeat(bars)+'░'.repeat(5-bars);
        return `<span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${color}">${arrow}</span><span style="font-family:var(--font-mono);font-size:9px;color:${color};letter-spacing:-1px"> ${filled}</span>`;
      })()}
    </td>
    <td class="td-m" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.project||'—')}</td>
    <td class="td-mono td-m" style="font-size:9px;white-space:nowrap">${esc(r.source||'—')}</td>
  </tr>`;
}

// ── MRS — grouped by MRS# ──────────────────────────────────────
function renderMRS() {
  const data = API.mrs || [];
  const q = (tblQ['mrs'] || '').toLowerCase();
  const filterStock = tblQ['mrsFilter'] || 'all'; // 'all','stock','project'

  let fd = data;
  if (q) fd = fd.filter(r => [r.mrsNum,r.project,r.partDesc,r.catNo,r.vendor,r.status,r.mrsLabel].some(f=>(f||'').toLowerCase().includes(q)));
  if (filterStock==='stock')   fd = fd.filter(r => r.isStock || String(r.project||'').toUpperCase().includes('STOCK'));
  if (filterStock==='project') fd = fd.filter(r => !r.isStock && !String(r.project||'').toUpperCase().match(/^STOCK$/i));

  // Group by actual MRS# (e.g. "25-0044")
  const groups = {}, groupOrder = [];
  fd.forEach(row => {
    const key = row.mrsNum || '?';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(row);
  });
  const allKeys = [...new Set(data.map(r => r.mrsNum || '?'))];

  const cards = groupOrder.length === 0
    ? `<div class="no-rows" style="font-family:var(--font-mono);padding:30px">no results</div>`
    : groupOrder.map(mrsNum => {
        const items = groups[mrsNum];
        const s0 = items[0];
        // Use isStock from API (set by Apps Script from separator row)
        const isStock = s0.isStock || String(s0.mrsLabel||s0.project||'').toUpperCase().replace(/\s/g,'').startsWith('STOCK');
        const stockBadge = isStock
          ? `<span class="pill" style="background:rgba(45,212,191,.12);color:#2dd4bf;border:1px solid rgba(45,212,191,.2)">🏭 STOCK</span>`
          : `<span class="pill" style="background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.2)">📦 PROJECT</span>`;

        const mrsDate  = s0.mrsDate  || '';
        const mrsLabel = s0.mrsLabel || s0.project || '';

        const cid = 'mrs_' + mrsNum.replace(/\W/g,'');
        const isOpen = openProj['mrs_'+mrsNum] !== undefined ? openProj['mrs_'+mrsNum] : false;
        const st = kpis(items.map(i=>({status:i.status, whStatus:i.delQty?'✅ Complete':'⬜ Pending', payStatus:i.amtPaid?'✅ Paid':'⬜ Unpaid'})));
        const totalAmt = items.reduce((s,r)=>s+Number(r.unitPrice||0)*Number(r.qty||0),0);

        const pills = [
          st.canvass && pill(`🟡 ${st.canvass}`,'rgba(251,191,36,.1)','#fbbf24'),
          st.issued  && pill(`✅ ${st.issued}`,'rgba(167,139,250,.1)','#a78bfa'),
          pill(items.length,'rgba(255,255,255,.05)','var(--text3)'),
        ].filter(Boolean).join('');

        // Sub-group by project/type within this MRS#
        const subGroups = {}, subOrder = [];
        items.forEach(r => {
          const k = r.project || r.type || '—';
          if (!subGroups[k]) { subGroups[k]=[]; subOrder.push(k); }
          subGroups[k].push(r);
        });

        let rowsHtml = '';
        subOrder.forEach(subKey => {
          const subItems = subGroups[subKey];
          rowsHtml += `<tr><td colspan="21" style="background:rgba(255,255,255,.025);border-left:2px solid rgba(56,189,248,.25);padding:4px 10px;font-family:var(--font-mono);font-size:9px;color:var(--text3)">${esc(subKey)} · ${subItems.length} item${subItems.length!==1?'s':''}</td></tr>`;
          subItems.forEach(row => {
            const s = 'MRS', r = row.rowIndex || 0;
            const mBal = (Number(row.qty||0)-Number(row.delQty||0)-Number(row.cancelQty||0));
            rowsHtml += `<tr>
              <td class="td-m" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                ${r?ec(row.category,s,r,4,'select',ALL_MRS_CATS||[]):`<span>${esc(row.category||'—')}</span>`}
              </td>
              <td class="td-clip" title="${escA(row.partDesc)}">${esc(row.partDesc||'—')}</td>
              <td class="td-mono td-m" style="min-width:110px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escA(row.catNo)}">${esc(row.catNo||'—')}</td>
              <td class="td-r td-mono">${row.qty||'—'}</td>
              <td class="td-m">${esc(row.unit||'—')}</td>
              ${r?ec(row.v1,s,r,16,'number'):`<td class="td-r td-mono grp-start">${row.v1||'—'}</td>`}
              ${r?ec(row.v2,s,r,17,'number'):`<td class="td-r td-mono">${row.v2||'—'}</td>`}
              ${r?ec(row.v3,s,r,18,'number'):`<td class="td-r td-mono">${row.v3||'—'}</td>`}
              ${(()=>{
                const pv=row.poNum||'';
                const haspo=pv.startsWith('P');
                const link=haspo?`<span onclick="event.stopPropagation();jumpToPO('${escJ(pv)}')" title="View PO" style="cursor:pointer;color:var(--accent);font-size:9px;margin-left:4px">↗</span>`:'';
                if(r) return ec(pv,s,r,13)+`<td style="padding:0;width:14px;border-bottom:1px solid rgba(255,255,255,.03)">${link}</td>`;
                return `<td class="td-mono grp-start">${esc(pv||'—')}${link}</td><td style="width:0;padding:0"></td>`;
              })()}
              ${r?ec(row.vendor,s,r,12):`<td class="td-sm">${esc(row.vendor||'—')}</td>`}
              ${r?ec(row.unitPrice,s,r,14,'number'):`<td class="td-r td-mono">${fP(row.unitPrice)}</td>`}
              ${r?ec(row.payTerms,s,r,24,'select',TERMS):`<td class="td-m">${esc(row.payTerms||'—')}</td>`}
              ${r?ec(row.delQty,s,r,25,'number'):`<td class="td-r td-mono grp-start">${row.delQty||'—'}</td>`}
              ${r?ec(row.cancelQty,s,r,26,'number'):`<td class="td-r td-mono">${row.cancelQty||'—'}</td>`}
              <td class="td-r td-mono" style="color:${mBal>0?'var(--amber)':'var(--text3)'}">${row.qty?mBal:'—'}</td>
              ${r?ec(row.expectedDate,s,r,28):`<td class="td-mono td-m" style="font-size:10px">${fD(row.expectedDate)}</td>`}
              ${r?ec(row.actualDate,s,r,29):`<td class="td-mono td-m" style="font-size:10px">${fD(row.actualDate)}</td>`}
              ${r?ec(row.status,s,r,11,'select',BOM_ST):`<td class="grp-start">${bdg(row.status)}</td>`}
              ${r?ec(row.invoice,s,r,31):`<td class="td-mono grp-start">${esc(row.invoice||'—')}</td>`}
              ${r?ec(row.amtPaid,s,r,32,'number'):`<td class="td-r td-mono">${fP(row.amtPaid)}</td>`}
              ${r?ec(row.orNum,s,r,33):`<td class="td-mono td-m">${esc(row.orNum||'—')}</td>`}
              ${r?ec(row.remarks,s,r,23):`<td class="td-m td-sm">${esc(row.remarks||'—')}</td>`}
            </tr>`;
          });
        });

        return `<div class="proj-card${isOpen?' open':''}" id="${cid}" style="margin-bottom:5px">
          <button class="proj-hdr" onclick="tp('mrs_${escJ(mrsNum)}','${cid}')">
            <span class="proj-arrow">▶</span>
            <span class="proj-name" style="font-family:var(--font-mono);color:var(--accent);font-size:13px;min-width:80px">MRS ${esc(mrsNum)}</span>
            ${stockBadge}
            ${mrsDate?`<span style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-left:6px">📅 ${esc(mrsDate)}</span>`:''}
            <span style="font-size:11px;color:var(--text2);margin-left:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(mrsLabel)}</span>
            <div style="display:flex;gap:3px;flex-shrink:0">${pills}</div>
          </button>
          <div class="proj-body">
            <div class="tbl-wrap" style="max-height:420px">
            <table>
              <thead>
                <tr class="cg-row">
                  <th colspan="5" class="cg-item">Item Info</th>
                  <th colspan="3" class="cg-canvass">Canvass</th>
                  <th colspan="4" class="cg-po">PO</th>
                  <th colspan="5" class="cg-delivery">Delivery</th>
                  <th colspan="1" class="cg-po">Status</th>
                  <th colspan="4" class="cg-payment">Payment</th>
                </tr>
                <tr>
                  <th>Category ✎</th><th>Description</th><th style="min-width:110px">Cat No</th><th>Qty</th><th>Unit</th>
                  <th class="e grp-start">V1</th><th class="e">V2</th><th class="e">V3</th>
                  <th class="e grp-start">PO #</th><th class="e">Vendor</th><th class="e">Unit Price</th><th class="e">Pay Terms</th>
                  <th class="e grp-start">Del Qty</th><th class="e">Cancel</th><th>Balance</th><th class="e">Expected</th><th class="e">Actual</th>
                  <th class="e grp-start">Status</th>
                  <th class="e grp-start">Invoice #</th><th class="e">Amt Paid</th><th class="e">OR #</th><th class="e">Remarks</th>
                </tr>
              </thead>
              <tbody>${rowsHtml}</tbody>
            </table></div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div class="flat-toolbar" style="flex-wrap:wrap;gap:6px">
        <input class="search" style="max-width:240px" type="text" placeholder="search MRS#, project, item…" value="${escA(q)}" oninput="tblQ['mrs']=this.value;renderMRS()">
        <div style="display:flex;gap:4px">
          <button class="btn${filterStock==='all'?' btn-accent':''}" onclick="tblQ['mrsFilter']='all';renderMRS()">All</button>
          <button class="btn${filterStock==='stock'?' btn-accent':''}" onclick="tblQ['mrsFilter']='stock';renderMRS()">🏭 Stock</button>
          <button class="btn${filterStock==='project'?' btn-accent':''}" onclick="tblQ['mrsFilter']='project';renderMRS()">📦 Project</button>
        </div>
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${groupOrder.length}/${allKeys.length} MRS · ${fd.length}/${data.length} items</span>
        ${q?`<button class="btn" onclick="tblQ['mrs']='';renderMRS()">clear</button>`:''}
        <button class="btn btn-green" onclick="openAddModal('mrs')">+ add item</button>
        <span style="font-size:9.5px;color:var(--text3);font-family:var(--font-mono);margin-left:auto">grouped by MRS# · ✎ click to edit</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 14px">${cards}</div>
    </div>`;
}
