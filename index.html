function openModalForm(cfg){
  const fields=cfg.fields.map(f=>`
    <div class="ff${f.full?' full':''}">
      <label class="fl">${esc(f.l)}${f.req?'<span style="color:var(--red)"> *</span>':''}</label>
      ${f.t==='select'
        ?`<select class="fi" id="f_${f.n}" name="${f.n}"><option value="">—</option>${(f.opts||[]).map(o=>`<option value="${escA(o)}"${o===f.def?' selected':''}>${esc(o)}</option>`).join('')}</select>`
        :`<input class="fi" id="f_${f.n}" type="${f.t==='number'?'number':'text'}" placeholder="${esc(f.l)}" value="${escA(f.def||'')}">`
      }
    </div>`).join('');
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="addModal" onclick="if(event.target===this)document.getElementById('addModal').remove()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <div>
            <div class="modal-title">${esc(cfg.title)}</div>
            ${cfg.sub?`<div class="modal-sub">${esc(cfg.sub)}</div>`:''}
          </div>
          <button class="btn" onclick="document.getElementById('addModal').remove()" style="padding:2px 7px;font-size:13px;border:none;background:transparent;color:var(--text3)">✕</button>
        </div>
        <div class="modal-body"><div class="form-grid">${fields}</div><div class="ferr" id="ferr"></div></div>
        <div class="modal-footer">
          <button class="btn" onclick="document.getElementById('addModal').remove()">cancel</button>
          <button class="btn btn-accent" id="fsub" onclick="submitModalForm()">💾 save to sheets</button>
        </div>
      </div>
    </div>`);
  // store cfg reference
  window._modalCfg=cfg;
  document.getElementById('f_'+cfg.fields[0].n)?.focus();
}

async function submitModalForm(){
  const cfg=window._modalCfg;if(!cfg)return;
  const formData={};cfg.fields.forEach(f=>{const el=document.getElementById('f_'+f.n);if(el)formData[f.n]=el.value;});
  const missing=cfg.fields.filter(f=>f.req&&!formData[f.n]);
  if(missing.length){const e=document.getElementById('ferr');e.style.display='';e.textContent='required: '+missing.map(f=>f.l).join(', ');return;}
  const btn=document.getElementById('fsub');btn.disabled=true;btn.textContent='saving…';
  try{
    const {sheet,values}=cfg.build(formData);
    const res=await fetch(WEB_APP+'?action=addRow&payload='+encodeURIComponent(JSON.stringify({sheet,values})));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Failed');
    document.getElementById('addModal')?.remove();
    toast('✅ Row added (row '+j.newRow+') — refreshing…','ok');
    setTimeout(()=>loadData(),2000);
  }catch(e){const err=document.getElementById('ferr');err.style.display='';err.textContent='❌ '+e.message;btn.disabled=false;btn.textContent='💾 save to sheets';}
}

function updateProjPreview(){
  const so=document.getElementById('fp_so').value.trim().toUpperCase();
  const cli=document.getElementById('fp_cli').value.trim().toUpperCase();
  const ttl=document.getElementById('fp_ttl').value.trim();
  const loc=document.getElementById('fp_loc')?.value.trim()||'';
  const contract=document.getElementById('fp_contract')?.value.trim()||'';
  const cpo=document.getElementById('fp_cpo')?.value.trim()||'';
  const target=document.getElementById('fp_target')?.value.trim()||'';
  const prev=document.getElementById('fp_prev');
  if(so||cli||ttl){
    prev.style.display='';
    document.getElementById('fp_tab').textContent=cli?'📦 '+cli:'—';
    document.getElementById('fp_so2').textContent=so||'—';
    document.getElementById('fp_ttl2').textContent=ttl+(loc?' | '+loc:'');
  } else prev.style.display='none';
}

async function submitAddProject(){
  const so=document.getElementById('fp_so').value.trim().toUpperCase();
  const cli=document.getElementById('fp_cli').value.trim().toUpperCase();
  const ttl=document.getElementById('fp_ttl').value.trim();
  const loc=document.getElementById('fp_loc')?.value.trim()||'';
  const contractAmt=document.getElementById('fp_contract')?.value.trim()||'';
  const clientPONum=document.getElementById('fp_cpo')?.value.trim()||'';
  const targetDate=document.getElementById('fp_target')?.value.trim()||'';
  const err=document.getElementById('fp_err');err.style.display='none';
  if(!so){err.style.display='';err.textContent='SO# is required';return;}
  if(!cli){err.style.display='';err.textContent='Client name is required';return;}
  if(!ttl){err.style.display='';err.textContent='Project title is required';return;}
  const btn=document.getElementById('fp_sub');btn.disabled=true;btn.textContent='creating…';
  try{
    const payload=JSON.stringify({soNum:so,clientName:cli,projectTitle:ttl,location:loc,contractAmt,clientPONum,targetDate});
    const res=await fetch(WEB_APP+'?action=addProject&payload='+encodeURIComponent(payload));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Failed');
    document.getElementById('projModal')?.remove();
    toast('✅ Created: '+j.sheetName+' — loading…','ok');
    // Reload data and auto-navigate to new client
    const newClientName=cli;
    setTimeout(async()=>{
      await loadDataSilent();
      activeCli=newClientName;
      go('bom');
      toast('✅ Switched to new project: '+j.sheetName,'ok');
    },2000);
  }catch(e){err.style.display='';err.textContent='❌ '+e.message;btn.disabled=false;btn.textContent='📦 create project';}
}
