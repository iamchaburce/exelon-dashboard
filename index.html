<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPSI Procurement Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:3px}
::-webkit-scrollbar-track{background:#f1f5f9}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:188px;min-width:188px;background:#1e1b4b;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:14px 12px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-icon{width:30px;height:30px;background:#7c3aed;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;margin-bottom:5px}
.sb-name{font-size:11.5px;font-weight:700;color:#fff}
.sb-sub{font-size:9px;color:#7c3aed}
.sb-sec{padding:9px 11px 2px;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#6d5bae}
.sb-item{padding:6px 11px;font-size:11px;color:#a78bfa;cursor:pointer;border-radius:5px;margin:1px 4px;transition:all .12s;display:flex;align-items:center;gap:7px}
.sb-item:hover{background:rgba(139,92,246,.12);color:#c4b5fd}
.sb-item.active{background:rgba(139,92,246,.22);color:#fff;font-weight:600}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:46px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.topbar-title{font-size:13.5px;font-weight:600}
.topbar-sub{font-size:9.5px;color:#94a3b8;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.error{background:#ef4444}
.sync-dot.saving{background:#3b82f6;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-msg{font-size:10px;color:#64748b;white-space:nowrap}
.btn{padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#64748b;transition:all .12s}
.btn:hover{background:#f8fafc}
.btn-primary{background:#7c3aed;color:#fff;border-color:#7c3aed}
.btn-primary:hover{background:#6d28d9}
.btn-success{background:#059669;color:#fff;border-color:#059669}
.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626;padding:3px 8px;font-size:10px}

/* Tabs */
.tabbar{border-bottom:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tabs-row{display:flex;padding:0 6px;white-space:nowrap;min-width:max-content}
.tab{padding:8px 13px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:#7c3aed}
.tab.active{color:#7c3aed;font-weight:700;border-bottom-color:#7c3aed;background:#fff}
.tbadge{font-size:9px;background:#e0e7ff;color:#4338ca;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:600}

/* Content */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:#64748b}
.spinner{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pane layouts */
.tbl-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tbl-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tbl-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:6px 9px;background:#f8fafc;color:#64748b;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;white-space:nowrap;position:sticky;top:0;z-index:2;text-align:left}
th.ec{background:#fffbeb}
td{padding:5px 9px;border-bottom:1px solid #f8fafc;color:#334155;vertical-align:middle}
tr:hover td{background:#fafafe}
tr:last-child td{border-bottom:none}
.td-clip{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-sm{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-m{color:#94a3b8}
.td-r{text-align:right}
.td-po{color:#7c3aed;font-weight:600}
.no-results{padding:22px;text-align:center;color:#94a3b8;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:9.5px;font-weight:600;white-space:nowrap}
.pill{font-size:9px;padding:1px 6px;border-radius:999px;font-weight:600;white-space:nowrap}

/* Client View */
.cv-pane{display:flex;flex-direction:column;flex:1;overflow:hidden}
.cv-clients{display:flex;overflow-x:auto;padding:0 6px;border-bottom:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0;scrollbar-width:none}
.cv-clients::-webkit-scrollbar{display:none}
.cctab{padding:6px 12px;border:none;background:transparent;cursor:pointer;font-size:11px;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500;transition:all .15s}
.cctab:hover{color:#7c3aed}
.cctab.active{color:#7c3aed;font-weight:700;border-bottom-color:#7c3aed;background:#fff}
.cv-body{flex:1;overflow-y:auto;padding:12px 16px}
.kpi-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;border-left-width:3px;min-width:90px}
.kpi-l{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.kpi-v{font-size:20px;font-weight:700}
.proj-card{border:1px solid #e2e8f0;border-radius:7px;overflow:hidden;margin-bottom:6px;transition:border-color .15s}
.proj-card.open{border-color:#c4b5fd}
.proj-hdr{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8fafc;border:none;cursor:pointer;text-align:left;transition:background .12s}
.proj-card.open .proj-hdr{background:#f5f3ff}
.proj-hdr:hover{background:#eff0fe}
.proj-arrow{font-size:9px;color:#94a3b8;min-width:9px;transition:transform .15s}
.proj-card.open .proj-arrow{transform:rotate(90deg);color:#7c3aed}
.proj-nm{font-size:12px;font-weight:600;color:#1e293b;flex:1}
.proj-card.open .proj-nm{color:#7c3aed}
.proj-pills{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.proj-body{display:none;background:#fff}
.proj-card.open .proj-body{display:block}

/* Editable cells */
.ec-cell{cursor:pointer}
.ec-cell:hover .ec-disp{background:#fef3c7;border-radius:3px}
.ec-disp{display:block;padding:2px 4px;border-radius:3px;min-height:18px;min-width:40px}
.ec-cell input,.ec-cell select{font-size:11px;padding:2px 5px;border:1.5px solid #7c3aed;border-radius:4px;background:#fff;color:#1e293b;outline:none;width:100%;min-width:80px;font-family:inherit}

/* Alerts */
.alert-card{border:1px solid;border-radius:7px;padding:10px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.alert-card.critical{background:#fff5f5;border-color:#fca5a5}
.alert-card.warning{background:#fffbeb;border-color:#fcd34d}
.alert-card.info{background:#eff6ff;border-color:#93c5fd}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:12px;font-weight:600;margin-bottom:2px}
.alert-desc{font-size:11px;color:#64748b}
.alert-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:auto;flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;width:min(560px,95vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-label{font-size:10.5px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.form-input{padding:7px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;outline:none;font-family:inherit;color:#1e293b;background:#fff}
.form-input:focus{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.1)}
.form-input select{padding:7px 10px}
select.form-input{padding:7px 10px}

/* Save toast */
.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;font-size:11px;padding:7px 16px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:2000}
.toast.show{opacity:1}
.toast.ok{background:#065f46}
.toast.err{background:#b91c1c}

/* Search */
.search-input{padding:6px 11px;font-size:12px;border:1px solid #cbd5e1;border-radius:6px;outline:none;background:#fff;color:#1e293b;flex:1;min-width:180px}
.search-input:focus{border-color:#7c3aed}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-icon">E</div>
    <div class="sb-name">Exelon Power</div>
    <div class="sb-sub">SOLUTIONS INC.</div>
  </div>
  <div class="sb-sec">Procurement</div>
  <div class="sb-item active" onclick="go('bom')">📦 Client / BOM</div>
  <div class="sb-item" onclick="go('po')">🛒 Purchase Orders</div>
  <div class="sb-item" onclick="go('wh')">🏭 WH Incoming</div>
  <div class="sb-item" onclick="go('vp')">💰 Vendor Payable</div>
  <div class="sb-item" onclick="go('mrs')">📝 MRS</div>
  <div class="sb-sec">Analytics</div>
  <div class="sb-item" onclick="go('history')">📊 Item History</div>
  <div class="sb-item" onclick="go('alerts')">🚨 Alerts</div>
  <div class="sb-sec">Equipment</div>
  <div class="sb-item" onclick="go('equip')">🔧 Equipment Monitor</div>
  <div class="sb-item" onclick="go('equiplog')">🛠️ Machine Log</div>
  <div class="sb-item" onclick="go('testequip')">🔬 Test Equipment</div>
  <div class="sb-sec">Tools</div>
  <div class="sb-item" onclick="loadData()">↻ Refresh All</div>
</nav>

<div class="main">
  <div class="topbar">
    <div style="min-width:0">
      <div class="topbar-title" id="pgTitle">Client View — BOM</div>
      <div class="topbar-sub" id="pgSub">Loading…</div>
    </div>
    <div class="topbar-right">
      <div class="sync-dot loading" id="dot"></div>
      <span class="sync-msg" id="msg">Connecting…</span>
      <button class="btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
  <div class="tabbar">
    <div class="tabs-row">
      <button class="tab active" data-t="bom"       onclick="go('bom')">📦 BOM<span class="tbadge" id="tb-bom">—</span></button>
      <button class="tab"        data-t="po"        onclick="go('po')">🛒 PO<span class="tbadge" id="tb-po">—</span></button>
      <button class="tab"        data-t="wh"        onclick="go('wh')">🏭 WH<span class="tbadge" id="tb-wh">—</span></button>
      <button class="tab"        data-t="vp"        onclick="go('vp')">💰 Payable<span class="tbadge" id="tb-vp">—</span></button>
      <button class="tab"        data-t="mrs"       onclick="go('mrs')">📝 MRS<span class="tbadge" id="tb-mrs">—</span></button>
      <button class="tab"        data-t="history"   onclick="go('history')">📊 Item History<span class="tbadge" id="tb-history">—</span></button>
      <button class="tab"        data-t="alerts"    onclick="go('alerts')">🚨 Alerts<span class="tbadge" id="tb-alerts" style="background:#fee2e2;color:#b91c1c">—</span></button>
      <button class="tab"        data-t="equip"     onclick="go('equip')">🔧 Equipment<span class="tbadge" id="tb-equip">—</span></button>
      <button class="tab"        data-t="equiplog"  onclick="go('equiplog')">🛠️ Log<span class="tbadge" id="tb-equiplog">—</span></button>
      <button class="tab"        data-t="testequip" onclick="go('testequip')">🔬 Test Equip<span class="tbadge" id="tb-testequip">—</span></button>
    </div>
  </div>
  <div class="content" id="area">
    <div class="center-screen"><div class="spinner"></div><div>Fetching live data…</div></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEB_APP='https://script.google.com/macros/s/AKfycbz5tZPx3jLzVbzfW-nzy72hk4RnZ_-L5hRbV8yX1zhbp1Qe-tJOVDUUwYNOoZW2H8pU/exec';
let API=null,activeTab='bom',activeCli='',openProj={},projQ={},itemQ={},tblQ={};

// ── Lookups ──────────────────────────────────────────────────
const BOM_ST=['🟡 For Canvass','🟢 Ready for PO','✅ PO Issued','🏭 Warehouse Stock','✅ Delivered'];
const WH_ST=['⬜ Pending','🔄 Partial','✅ Complete'];
const PAY_ST=['','⬜ Unpaid','🔄 Partial Pay','✅ Paid'];
const PO_ST=['For Approval','✅ Approved','✅ Delivered','❌ Cancelled'];
const TERMS=['COD','30 days','45 days','60 days','Upon Delivery','Advanced'];
const MACH_ST=['Active','Under Maintenance','For Repair','Retired'];
const LOG_TYPE=['PM','Repair','Calibration','Inspection','Breakdown'];
const CALIB_ST=['Valid','Due Soon','Overdue','For Calibration'];
const BDGM={
  '🟡 For Canvass':['#fef3c7','#d97706'],'🟢 Ready for PO':['#d1fae5','#065f46'],
  '✅ PO Issued':['#ede9fe','#6d28d9'],'🏭 Warehouse Stock':['#dbeafe','#1d4ed8'],
  '✅ Delivered':['#d1fae5','#065f46'],'⬜ Pending':['#f1f5f9','#64748b'],
  '🔄 Partial':['#ffedd5','#c2410c'],'🔄 Partial Pay':['#ffedd5','#c2410c'],
  '✅ Complete':['#d1fae5','#065f46'],'⬜ Unpaid':['#fee2e2','#b91c1c'],
  '✅ Paid':['#d1fae5','#065f46'],'✅ Approved':['#d1fae5','#065f46'],
  '❌ Cancelled':['#fee2e2','#b91c1c'],'Active':['#d1fae5','#065f46'],
  'Under Maintenance':['#ffedd5','#c2410c'],'For Repair':['#fee2e2','#b91c1c'],
  'Retired':['#f1f5f9','#64748b'],'Valid':['#d1fae5','#065f46'],
  'Due Soon':['#fef3c7','#d97706'],'Overdue':['#fee2e2','#b91c1c'],
  'For Calibration':['#ffedd5','#c2410c']
};
function bdg(v){if(!v&&v!==0)return'<span class="badge" style="background:#f1f5f9;color:#94a3b8">—</span>';const s=BDGM[v]||['#f1f5f9','#64748b'];return`<span class="badge" style="background:${s[0]};color:${s[1]}">${esc(v)}</span>`;}
function pll(t,bg,c){return`<span class="pill" style="background:${bg};color:${c}">${t}</span>`;}
function fP(v){if(v===''||v==null)return'—';const n=parseFloat(v);if(isNaN(n))return'—';return'₱'+n.toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fD(v){if(!v)return'—';try{const d=new Date(v);if(isNaN(d))return v;return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}catch{return v;}}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s??'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escJ(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

// ── Toast ─────────────────────────────────────────────────────
let toastTm;
function toast(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+t;clearTimeout(toastTm);toastTm=setTimeout(()=>el.classList.remove('show'),2800);}

// ── Save to Sheet ─────────────────────────────────────────────
async function saveCell(sheet,row,col,val){
  setSyncState('saving','Saving…');
  try{
    const res=await fetch(WEB_APP+'?action=updateCell&payload='+encodeURIComponent(JSON.stringify({sheet,row,col,value:val})));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Failed');
    setSyncState('ok','Saved ✓');toast('✅ Saved to Google Sheets','ok');
    setTimeout(()=>setSyncState('ok','Live'),3000);
  }catch(e){setSyncState('error','Error');toast('❌ '+e.message,'err');}
}

async function addRow(sheet,values){
  setSyncState('saving','Adding…');
  try{
    const res=await fetch(WEB_APP+'?action=addRow&payload='+encodeURIComponent(JSON.stringify({sheet,values})));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Failed');
    setSyncState('ok','Saved ✓');toast('✅ Row added to Google Sheets — row '+j.newRow,'ok');
    setTimeout(()=>{setSyncState('ok','Live');loadData();},2000);
    return j;
  }catch(e){setSyncState('error','Error');toast('❌ '+e.message,'err');throw e;}
}

function setSyncState(state,msg){
  document.getElementById('dot').className='sync-dot'+(state==='loading'?' loading':state==='saving'?' saving':state==='error'?' error':'');
  document.getElementById('msg').textContent=msg;
}

// ── Editable cell ─────────────────────────────────────────────
function ec(val,sheet,row,col,type='text',opts=null){
  const id='e'+Math.random().toString(36).slice(2,8);
  const dv=val===''||val==null?'—':val;
  const rv=val===null||val===undefined?'':String(val);
  let inner;
  if(type==='select'&&opts){
    const o=opts.map(x=>`<option value="${escA(x)}"${x===rv?' selected':''}>${esc(x)}</option>`).join('');
    inner=`<span class="ec-disp" id="d${id}">${rv?bdg(rv):'<span style="color:#94a3b8">—</span>'}</span>
    <select id="i${id}" style="display:none" onchange="cc('${id}','${escJ(sheet)}',${row},${col},'select')" onblur="xc('${id}')"><option value="">—</option>${o}</select>`;
  }else{
    inner=`<span class="ec-disp" id="d${id}">${esc(dv)}</span>
    <input id="i${id}" type="${type==='number'?'number':'text'}" value="${escA(rv)}" style="display:none"
      onkeydown="if(event.key==='Enter')cc('${id}','${escJ(sheet)}',${row},${col},'${type}');if(event.key==='Escape')xc('${id}')"
      onblur="cc('${id}','${escJ(sheet)}',${row},${col},'${type}')">`;
  }
  return`<td class="ec-cell" onclick="ac(event,'${id}')" title="Click to edit">${inner}</td>`;
}
function ac(e,id){e.stopPropagation();const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i||i.style.display!=='none')return;d.style.display='none';i.style.display='block';i.focus();if(i.tagName==='INPUT')i.select();}
function cc(id,sh,row,col,type){const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i)return;const v=i.value;i.style.display='none';d.style.display='';if(type==='select')d.innerHTML=v?bdg(v):'<span style="color:#94a3b8">—</span>';else d.textContent=v||'—';saveCell(sh,row,col,v);}
function xc(id){const d=document.getElementById('d'+id),i=document.getElementById('i'+id);if(!i)return;i.style.display='none';d.style.display='';}

// ── Load data ─────────────────────────────────────────────────
async function loadData(){
  setSyncState('loading','Syncing…');
  document.getElementById('area').innerHTML='<div class="center-screen"><div class="spinner"></div><div>Fetching live data from Google Sheets…</div></div>';
  try{
    const res=await fetch(WEB_APP+'?action=load');
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'API error');
    API=j;
    // Update badges
    const bom=j.bom||[],po=j.po||[],wh=j.wh||[],vp=j.vp||[],mrs=j.mrs||[],hist=j.itemHistory||[];
    const ml=j.machineList||[],mlog=j.machineLog||[],te=j.testEquip||[];
    const alerts=buildAlerts(bom,wh,vp);
    document.getElementById('tb-bom').textContent=bom.length;
    document.getElementById('tb-po').textContent=po.length;
    document.getElementById('tb-wh').textContent=wh.length;
    document.getElementById('tb-vp').textContent=vp.length;
    document.getElementById('tb-mrs').textContent=mrs.length;

}

const TITLES={bom:'Client View — BOM',po:'Purchase Orders',wh:'WH Incoming',vp:'Vendor Payable',mrs:'Material Request Sheet',history:'Item History',alerts:'Alerts & Action Required',equip:'Equipment Monitor',equiplog:'Machine Log',testequip:'Test Equipment'};
function go(tab){
  activeTab=tab;
  document.querySelectorAll('.tab,.sb-item').forEach(el=>{
    const dt=el.dataset?.t;
    const onclick=el.getAttribute('onclick')||'';
    el.classList.toggle('active',dt===tab||onclick.includes("'"+tab+"'"));
  });
  document.getElementById('pgTitle').textContent=TITLES[tab]||tab;
  if(API)renderTab(tab);
}
function renderTab(tab){
  if(!API)return;
  if(tab==='bom')renderBOM();
  else if(tab==='po')renderFlat('po',API.po||[],poCfg());
  else if(tab==='wh')renderFlat('wh',API.wh||[],whCfg());
  else if(tab==='vp')renderFlat('vp',API.vp||[],vpCfg());
  else if(tab==='mrs')renderFlat('mrs',API.mrs||[],mrsCfg());
  else if(tab==='history')renderFlat('history',API.itemHistory||[],historyCfg());
  else if(tab==='alerts')renderAlerts();
  else if(tab==='equip')renderFlat('equip',API.machineList||[],equipCfg());
  else if(tab==='equiplog')renderFlat('equiplog',API.machineLog||[],equipLogCfg());
  else if(tab==='testequip')renderFlat('testequip',API.testEquip||[],testEquipCfg());
}

// ── BOM / Client View ─────────────────────────────────────────
function getBOMClients(){return[...new Set((API.bom||[]).map(r=>r.sheet))].map(s=>({sheet:s,name:s.replace(/^📦\s*/,'').trim()}));}
function getBOMForClient(name){return(API.bom||[]).filter(r=>r.sheet.replace(/^📦\s*/,'').trim()===name);}

function renderBOM(){
  const clients=getBOMClients();
  if(!activeCli&&clients.length)activeCli=clients[0].name;
  const items=getBOMForClient(activeCli);
  const projMap={};
  items.forEach(it=>{const p=(it.project||'No Project').toString().trim();if(!projMap[p])projMap[p]=[];projMap[p].push(it);});
  const pKeys=Object.keys(projMap);
  const pq=(projQ['bom']||'').toLowerCase();
  const fp=pq?pKeys.filter(p=>p.toLowerCase().includes(pq)):pKeys;
  const st=bst(items);
  const ctabs=clients.map(c=>`<button class="cctab${c.name===activeCli?' active':''}" onclick="activeCli='${escJ(c.name)}';renderBOM()">${esc(c.name)}<span style="font-size:9px;opacity:.6;margin-left:3px">${getBOMForClient(c.name).length}</span></button>`).join('');
  const kpis=[['🟡 Canvass',st.canvass,'#d97706','#fef3c7'],['🟢 Ready',st.ready,'#065f46','#d1fae5'],['✅ PO',st.issued,'#6d28d9','#ede9fe'],['🏭 WH',st.wh,'#1d4ed8','#dbeafe'],['✅ Done',st.done,'#065f46','#d1fae5'],['⬜ Unpaid',st.unpaid,'#b91c1c','#fee2e2'],['📦 Total',st.total,'#7c3aed','#f5f3ff']].map(([l,v,tc,bg])=>`<div class="kpi" style="border-left-color:${tc}"><div class="kpi-l" style="color:${tc}">${l}</div><div class="kpi-v" style="color:${tc}">${v}</div></div>`).join('');
  const cards=fp.length===0?`<div class="no-results">No projects match "${esc(pq)}"</div>`:fp.map(p=>buildProjCard(p,projMap[p],pKeys)).join('');
  document.getElementById('area').innerHTML=`
  <div class="cv-pane">
    <div class="cv-clients">${ctabs}</div>
    <div class="cv-body">
      <div class="kpi-row">${kpis}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <input class="search-input" type="text" placeholder="🔍 Search projects…" value="${escA(projQ['bom']||'')}" oninput="projQ['bom']=this.value;renderBOM()">
        <span style="font-size:10px;color:#94a3b8">${fp.length}/${pKeys.length}</span>

function bst(items){return{total:items.length,canvass:items.filter(i=>i.status==='🟡 For Canvass').length,ready:items.filter(i=>i.status==='🟢 Ready for PO').length,issued:items.filter(i=>i.status==='✅ PO Issued').length,wh:items.filter(i=>i.status==='🏭 Warehouse Stock').length,done:items.filter(i=>i.whStatus==='✅ Complete').length,unpaid:items.filter(i=>i.payStatus==='⬜ Unpaid').length};}

function buildProjCard(proj,items,allKeys){
  const isOpen=openProj[proj]!==undefined?openProj[proj]:proj===allKeys[0];
  const st=bst(items);const iq=(itemQ[proj]||'').toLowerCase();
  const fi=iq?items.filter(i=>[i.partDesc,i.catNo,i.vendor,i.poNum,i.status,i.category].some(f=>(f||'').toString().toLowerCase().includes(iq))):items;
  const pills=[st.canvass&&pll(`🟡 ${st.canvass}`,'#fef3c7','#d97706'),st.ready&&pll(`🟢 ${st.ready}`,'#d1fae5','#065f46'),st.issued&&pll(`✅ ${st.issued}`,'#ede9fe','#6d28d9'),st.done&&pll(`🏭 ${st.done}`,'#dbeafe','#1d4ed8'),st.unpaid&&pll(`⬜ ${st.unpaid}`,'#fee2e2','#b91c1c'),pll(items.length,'#f1f5f9','#64748b')].filter(Boolean).join('');
  const cid='pc'+btoa(encodeURIComponent(proj)).replace(/\W/g,'').slice(0,14);

    <td class="td-m td-r">${it.num}</td><td class="td-m" style="white-space:nowrap">${fD(it.date)}</td>

    <td class="td-m td-sm">${esc(it.catNo||'—')}</td>
    ${r?ec(it.vendor,sh,r,16):`<td class="td-sm">${esc(it.vendor||'—')}</td>`}
    ${r?ec(it.poNum,sh,r,15):`<td class="td-po">${esc(it.poNum||'—')}</td>`}
    <td class="td-r">${it.qty||'—'}</td><td class="td-m">${esc(it.unit||'—')}</td>
    ${r?ec(it.unitPrice,sh,r,17,'number'):`<td class="td-r">${fP(it.unitPrice)}</td>`}
    ${r?ec(it.v1,sh,r,19,'number'):`<td class="td-r td-m">${it.v1||'—'}</td>`}
    ${r?ec(it.v2,sh,r,20,'number'):`<td class="td-r td-m">${it.v2||'—'}</td>`}
    ${r?ec(it.v3,sh,r,21,'number'):`<td class="td-r td-m">${it.v3||'—'}</td>`}
    ${r?ec(it.status,sh,r,14,'select',BOM_ST):`<td>${bdg(it.status)}</td>`}
    ${r?ec(it.whStatus,sh,r,26,'select',WH_ST):`<td>${bdg(it.whStatus)}</td>`}
    ${r?ec(it.payStatus,sh,r,27,'select',PAY_ST):`<td>${bdg(it.payStatus)}</td>`}
  </tr>`;}).join('');
  return`<div class="proj-card${isOpen?' open':''}" id="${cid}">
    <button class="proj-hdr" onclick="tp('${escJ(proj)}','${cid}')">
      <span class="proj-arrow">▶</span><span class="proj-nm">${esc(proj)}</span>
      <div class="proj-pills">${pills}</div>
    </button>
    <div class="proj-body">
      <div style="padding:6px 11px;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:center">
        <input style="flex:1;padding:4px 9px;font-size:11px;border:1px solid #e2e8f0;border-radius:5px;outline:none;background:#f8fafc;color:#1e293b" type="text" value="${escA(itemQ[proj]||'')}" placeholder="🔍 Search ${items.length} items…" oninput="itemQ['${escJ(proj)}']=this.value;renderBOM()">
      </div>

      <table><thead><tr>
        <th>#</th><th>Date</th><th>Category</th><th>Description</th><th>Cat No</th>
        <th class="ec">Vendor ✎</th><th class="ec">PO # ✎</th>
        <th>Qty</th><th>Unit</th><th class="ec">Unit Price ✎</th>
        <th class="ec">V1 ✎</th><th class="ec">V2 ✎</th><th class="ec">V3 ✎</th>
        <th class="ec">Status ✎</th><th class="ec">WH ✎</th><th class="ec">Pay ✎</th>

function tp(proj,cid){const card=document.getElementById(cid);if(!card)return;const n=!card.classList.contains('open');card.classList.toggle('open',n);openProj[proj]=n;}

// ── Flat table renderer ───────────────────────────────────────
function renderFlat(key,data,cfg){
  const q=(tblQ[key]||'').toLowerCase();
  const fd=q?data.filter(r=>cfg.search.some(f=>(r[f]||'').toString().toLowerCase().includes(q))):data;
  const heads=cfg.cols.map(c=>`<th${c.e?' class="ec"':''}>${esc(c.lbl)}${c.e?' ✎':''}</th>`).join('');
  const rows=fd.length===0?`<tr><td colspan="${cfg.cols.length}" class="no-results">No results${q?` for "${esc(q)}"`:''}</td></tr>`:fd.map(row=>'<tr>'+cfg.cols.map(c=>{const v=row[c.f];if(c.e&&row.rowIndex)return ec(v,cfg.sheet,row.rowIndex,c.col,c.type||'text',c.opts||null);if(c.bdg)return`<td>${bdg(v)}</td>`;if(c.peso)return`<td class="td-r">${fP(v)}</td>`;if(c.date)return`<td style="white-space:nowrap;color:#94a3b8">${fD(v)}</td>`;if(c.m)return`<td class="td-m td-sm">${esc(v||'—')}</td>`;if(c.clip)return`<td class="td-clip" title="${escA(v)}">${esc(v||'—')}</td>`;return`<td>${esc(v||'—')}</td>`;}).join('')+'</tr>').join('');
  document.getElementById('area').innerHTML=`
  <div class="tbl-pane">
    <div class="tbl-toolbar">
      <input class="search-input" style="max-width:280px" type="text" placeholder="🔍 Search ${data.length} rows…" value="${escA(tblQ[key]||'')}" oninput="tblQ['${key}']=this.value;renderTab('${key}')">
      <span style="font-size:10px;color:#94a3b8">${fd.length}/${data.length}</span>
      ${tblQ[key]?`<button class="btn" onclick="tblQ['${key}']='';renderTab('${key}')">Clear</button>`:''}
      ${cfg.addBtn?`<button class="btn btn-success" onclick="openAddModal('${key}')">➕ Add Row</button>`:''}
      <span style="font-size:10px;color:#94a3b8;margin-left:auto">⚡ Click <span style="background:#fffbeb;padding:1px 5px;border-radius:3px;color:#d97706;font-weight:600">yellow columns</span> to edit → syncs to Google Sheets</span>
    </div>
    <div class="tbl-wrap"><table><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

// ── Alerts ────────────────────────────────────────────────────
function buildAlerts(bom,wh,vp){
  const alerts=[];
  const canvass=bom.filter(i=>i.status==='🟡 For Canvass');
  if(canvass.length)alerts.push({type:'warning',icon:'🟡',title:`${canvass.length} items For Canvass`,desc:'Need vendor quotation: '+[...new Set(canvass.slice(0,3).map(i=>i.partDesc?.substring(0,30)))].join(', ')+(canvass.length>3?` + ${canvass.length-3} more`:''),count:canvass.length});
  const ready=bom.filter(i=>i.status==='🟢 Ready for PO');
  if(ready.length)alerts.push({type:'info',icon:'🟢',title:`${ready.length} items Ready for PO`,desc:'Waiting for PO issuance: '+[...new Set(ready.slice(0,3).map(i=>i.vendor||'No vendor'))].join(', ')+(ready.length>3?` + ${ready.length-3} more`:''),count:ready.length});
  const unpaid=vp.filter(i=>i.payStatus==='⬜ Unpaid');
  if(unpaid.length)alerts.push({type:'critical',icon:'🔴',title:`${unpaid.length} Unpaid Vendor Payables`,desc:'Overdue: '+[...new Set(unpaid.slice(0,3).map(i=>i.supplier||i.vendor||'Unknown'))].join(', ')+(unpaid.length>3?` + ${unpaid.length-3} more`:''),count:unpaid.length});
  const noWH=bom.filter(i=>i.status==='✅ PO Issued'&&(!i.whStatus||i.whStatus==='⬜ Pending'));
  if(noWH.length)alerts.push({type:'warning',icon:'🚚',title:`${noWH.length} POs Pending Delivery`,desc:'PO issued but not yet in WH Incoming',count:noWH.length});
  const partial=wh.filter(i=>i.status==='🔄 Partial');
  if(partial.length)alerts.push({type:'info',icon:'📦',title:`${partial.length} Partial Deliveries`,desc:'Items partially delivered in WH Incoming',count:partial.length});
  return alerts;
}

function renderAlerts(){
  const alerts=buildAlerts(API.bom||[],API.wh||[],API.vp||[]);
  const cards=alerts.length===0?'<div class="no-results" style="padding:40px">✅ No alerts — everything looks good!</div>':alerts.map(a=>`
    <div class="alert-card ${a.type}">
      <span class="alert-icon">${a.icon}</span>
      <div style="flex:1">
        <div class="alert-title">${esc(a.title)}</div>
        <div class="alert-desc">${esc(a.desc)}</div>
      </div>
      <span class="alert-badge" style="background:${a.type==='critical'?'#fee2e2;color:#b91c1c':a.type==='warning'?'#fef3c7;color:#d97706':'#eff6ff;color:#1d4ed8'}">${a.count}</span>
    </div>`).join('');
  document.getElementById('area').innerHTML=`
  <div style="flex:1;overflow-y:auto;padding:16px 20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600">${alerts.length} Active Alert${alerts.length!==1?'s':''}</div>
      <button class="btn" onclick="loadData()">↻ Refresh</button>
    </div>
    ${cards}
  </div>`;
}

function openAddModal(key){
  const cfg=MODAL_FORMS[key];if(!cfg)return;
  const fields=cfg.fields.map(f=>`
    <div class="form-field${f.full?' full':''}">
      <label class="form-label">${esc(f.l)}${f.req?' <span style="color:#ef4444">*</span>':''}</label>
      ${f.t==='select'
        ?`<select class="form-input" id="f_${f.n}" name="${f.n}"><option value="">—</option>${(f.opts||[]).map(o=>`<option value="${escA(o)}"${o===f.def?' selected':''}>${esc(o)}</option>`).join('')}</select>`
        :`<input class="form-input" id="f_${f.n}" name="${f.n}" type="${f.t==='number'?'number':'text'}" placeholder="${esc(f.l)}" value="${escA(f.def||'')}">` }
    </div>`).join('');
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <div class="modal-title">${esc(cfg.title)}</div>
          <button class="btn" onclick="closeModal()" style="padding:2px 8px;font-size:14px;border:none;color:#94a3b8">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">${fields}</div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitModal('${key}')">💾 Save to Google Sheets</button>
        </div>
      </div>
    </div>`);
}

function closeModal(){const m=document.getElementById('addModal');if(m)m.remove();}

async function submitModal(key){
  const cfg=MODAL_FORMS[key];if(!cfg)return;
  const formData={};
  cfg.fields.forEach(f=>{const el=document.getElementById('f_'+f.n);if(el)formData[f.n]=el.value;});
  // Validate required
  const missing=cfg.fields.filter(f=>f.req&&!formData[f.n]);
  if(missing.length){toast('❌ Required: '+missing.map(f=>f.l).join(', '),'err');return;}
  try{
    const {sheet,values}=cfg.build(formData);
    if(!sheet)return;
    const btn=document.querySelector('#addModal .btn-primary');
    if(btn){btn.disabled=true;btn.textContent='Saving…';}
    await addRow(sheet,values);
    closeModal();
  }catch(e){toast('❌ '+e.message,'err');}
}
